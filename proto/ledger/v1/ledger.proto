syntax = "proto3";

package ledger.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/inferadb/ledger/gen/go/ledger/v1;ledgerv1";

// API Version: 1
// The server validates x-ledger-api-version headers on client-facing RPCs.
// Fields planned for removal must be annotated with [deprecated = true] and a
// comment specifying the removal version, e.g.:
//   string old_field = 5 [deprecated = true]; // Removed in API v2

// =============================================================================
// Core Types
// =============================================================================

// 256-bit hash (SHA-256)
message Hash {
  bytes value = 1; // 32 bytes
}

// External organization identifier (Snowflake-generated slug)
// This is the only identifier exposed to API consumers.
// Internal sequential OrganizationId(i64) is used for storage but never appears in the API.
// Special case: slug = 0 is reserved for _system
message OrganizationSlug {
  uint64 slug = 1;
}

// External Snowflake identifier for a vault.
// This is the only vault identifier exposed to API consumers.
// Internal sequential VaultId(i64) is used for storage but never appears in the API.
message VaultSlug {
  uint64 slug = 1;
}

// External Snowflake identifier for a user.
// This is the only user identifier exposed to API consumers.
// Internal sequential UserId(i64) is used for storage but never appears in the API.
message UserSlug {
  uint64 slug = 1;
}

// External Snowflake identifier for a team within an organization.
// This is the only team identifier exposed to API consumers.
// Internal sequential TeamId(i64) is used for storage but never appears in the API.
message TeamSlug {
  uint64 slug = 1;
}

message AppSlug {
  uint64 slug = 1;
}

message ClientAssertionId {
  int64 id = 1;
}

// Geographic region for data residency. Each Raft consensus group maps 1:1 to
// a region. Organizations declare a region governing where their data is stored.
enum Region {
  REGION_UNSPECIFIED = 0;
  REGION_GLOBAL = 1;

  // North America (10-19)
  REGION_US_EAST_VA = 10;
  REGION_US_WEST_OR = 11;
  REGION_CA_CENTRAL_QC = 12;

  // South America (20-29)
  REGION_BR_SOUTHEAST_SP = 20;

  // Europe — EU/EEA (30-39)
  REGION_IE_EAST_DUBLIN = 30;
  REGION_FR_NORTH_PARIS = 31;
  REGION_DE_CENTRAL_FRANKFURT = 32;
  REGION_SE_EAST_STOCKHOLM = 33;
  REGION_IT_NORTH_MILAN = 34;

  // United Kingdom (40-49)
  REGION_UK_SOUTH_LONDON = 40;

  // Middle East & Africa (50-59)
  REGION_SA_CENTRAL_RIYADH = 50;
  REGION_BH_CENTRAL_MANAMA = 51;
  REGION_AE_CENTRAL_DUBAI = 52;
  REGION_IL_CENTRAL_TEL_AVIV = 53;
  REGION_ZA_SOUTH_CAPE_TOWN = 54;
  REGION_NG_WEST_LAGOS = 55;

  // Asia Pacific (60-69)
  REGION_SG_CENTRAL_SINGAPORE = 60;
  REGION_AU_EAST_SYDNEY = 61;
  REGION_ID_WEST_JAKARTA = 62;
  REGION_JP_EAST_TOKYO = 63;
  REGION_KR_CENTRAL_SEOUL = 64;
  REGION_IN_WEST_MUMBAI = 65;
  REGION_VN_SOUTH_HCMC = 66;

  // China (70-79)
  REGION_CN_NORTH_BEIJING = 70;
}

// Unique node identifier
message NodeId {
  string id = 1;
}

// Unique user identifier (global, stored in _system organization).
// Sequential int64 assigned by the Raft leader via Snowflake ID generation.
message UserId {
  int64 id = 1;
}

// Unique identifier for a user email record.
// Sequential int64 assigned by Ledger leader from sequence counter "_meta:seq:user_email"
message UserEmailId {
  int64 id = 1;
}

// Unique identifier for an email verification token.
// Sequential int64 assigned by Ledger leader from sequence counter "_meta:seq:email_verify"
message EmailVerifyTokenId {
  int64 id = 1;
}

// User account status (lifecycle state machine)
enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_ACTIVE = 1;      // User can authenticate
  USER_STATUS_PENDING_ORG = 2; // Pending organization creation (saga in progress)
  USER_STATUS_SUSPENDED = 3;   // User cannot authenticate
  USER_STATUS_DELETING = 4;    // Deletion cascade in progress
  USER_STATUS_DELETED = 5;     // Tombstone for audit
}

// User role for global service authorization.
// Organization-level permissions are separate (derived from membership records).
enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;  // Treated as USER (regular user)
  USER_ROLE_USER = 1;         // Regular user
  USER_ROLE_ADMIN = 2;        // Global service administrator
}

// User record (stored in _system organization as Entity with key "user:{id}")
// Users can have multiple email addresses via separate UserEmail entities.
// Organization access is derived from membership records (member:{id} in each org).
// ID assigned by Ledger leader from sequence counter "_meta:seq:user"
message User {
  UserId id = 1;
  string name = 2;              // Display name (1-200 characters)
  UserEmailId email = 3;        // References UserEmail.id
  UserStatus status = 4;        // Lifecycle state
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  UserRole role = 7;            // Authorization role (default: USER)
  UserSlug slug = 8;            // External Snowflake identifier
  optional google.protobuf.Timestamp deleted_at = 9; // When soft-delete was initiated
}

// User email address (stored in _system organization as Entity with key "user_email:{id}")
// Global email uniqueness is enforced via index: "_idx:email:{email}" → email_id
// ID assigned by Ledger leader from sequence counter "_meta:seq:user_email"
message UserEmail {
  UserEmailId id = 1;                      // Sequential ID (Ledger-assigned)
  UserId user = 2;                         // Owning user
  string email = 3;                        // Normalized to lowercase (max 320 chars per RFC 5321)
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp verified_at = 5; // When verified (null if unverified)
}

// Email verification token (stored in _system organization with TTL)
// Key: "email_verify:{id}", Index: "_idx:email_verify_hash:{hex}" → token_id
// Tokens expire after 24 hours via Ledger's TTL mechanism.
// ID assigned by Ledger leader from sequence counter "_meta:seq:email_verify"
message EmailVerificationToken {
  EmailVerifyTokenId id = 1; // Sequential ID (Ledger-assigned)
  UserEmailId user_email_id = 2; // Email being verified
  string token = 3; // 64-char hex string (32 random bytes)
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp expires_at = 5; // For application-level validation
  google.protobuf.Timestamp used_at = 6; // When token was consumed (null if unused)
}

// Unique client identifier (for idempotency)
message ClientId {
  string id = 1; // Opaque string (max 256 chars, typically API key ID)
}

// Unique transaction identifier
message TxId {
  bytes id = 1; // UUID as 16 bytes
}

// =============================================================================
// Block & Transaction Types
// =============================================================================

message BlockHeader {
  uint64 height = 1;
  OrganizationSlug organization = 2; // Owning organization
  VaultSlug vault = 3; // Vault within organization
  Hash previous_hash = 4;
  Hash tx_merkle_root = 5;
  Hash state_root = 6;
  google.protobuf.Timestamp timestamp = 7;
  // Note: leader_id is included in proto for API completeness but excluded from
  // the 148-byte deterministic block hash computation. This ensures blocks hash
  // identically regardless of which leader committed them. The leader_id is stored
  // in RegionBlock and populated when extracting VaultBlock for client responses.
  NodeId leader_id = 8;
  uint64 term = 9;
  uint64 committed_index = 10;
  // Server-computed hash of this block header. Allows clients to verify
  // chain continuity (curr.previous_hash == prev.block_hash) without
  // recomputing the hash, which requires internal IDs not exposed via API.
  Hash block_hash = 11;
}

message Block {
  BlockHeader header = 1;
  repeated Transaction transactions = 2;
}

// Lightweight block notification for streaming (excludes transaction bodies)
message BlockAnnouncement {
  OrganizationSlug organization = 1; // Owning organization
  VaultSlug vault = 2; // Vault within organization
  uint64 height = 3;
  Hash block_hash = 4;
  Hash state_root = 5;
  google.protobuf.Timestamp timestamp = 6;
}

message Transaction {
  TxId id = 1;
  ClientId client_id = 2;
  uint64 sequence = 3;
  repeated Operation operations = 4;
  google.protobuf.Timestamp timestamp = 5;
}

message Operation {
  oneof op {
    CreateRelationship create_relationship = 1;
    DeleteRelationship delete_relationship = 2;
    SetEntity set_entity = 3;
    DeleteEntity delete_entity = 4;
    ExpireEntity expire_entity = 5; // GC-initiated removal (distinct from user delete)
  }
}

message CreateRelationship {
  string resource = 1; // Format: "type:id" (max 512 chars total)
  string relation = 2; // Relation name (max 64 chars, e.g., "viewer", "editor")
  string subject = 3; // Format: "type:id" or "type:id#relation" (max 512 chars)
}

message DeleteRelationship {
  string resource = 1; // Format: "type:id" (max 512 chars total)
  string relation = 2; // Relation name (max 64 chars)
  string subject = 3; // Format: "type:id" or "type:id#relation" (max 512 chars)
}

message SetEntity {
  string key = 1; // Entity key (max 1024 bytes, UTF-8)
  bytes value = 2; // Entity value (max 1MB)
  optional uint64 expires_at = 3; // Unix epoch seconds; 0 or omit = never expires
  optional SetCondition condition = 4; // Optional conditional write (CAS)
}

// Condition for compare-and-set writes (used for coordination primitives)
message SetCondition {
  oneof condition {
    bool not_exists = 1; // Only set if key doesn't exist
    uint64 version = 2; // Only set if key was last modified at this block height
    bytes value_equals = 3; // Only set if current value matches exactly
    bool must_exists = 4; // Only set if key already exists (for safe updates)
  }
}

message DeleteEntity {
  string key = 1; // Entity key (max 1024 bytes, UTF-8)
}

// GC-initiated entity removal (distinct from user deletion for audit trail)
message ExpireEntity {
  string key = 1; // Entity key (max 1024 bytes, UTF-8)
  uint64 expired_at = 2; // When the entity's TTL was reached (Unix epoch seconds)
}

// Relationship tuple (used in query results)
message Relationship {
  string resource = 1; // Format: "type:id" (max 512 chars)
  string relation = 2; // Relation name (max 64 chars)
  string subject = 3; // Format: "type:id" or "type:id#relation" (max 512 chars)
}

// Entity (used in query results)
message Entity {
  string key = 1; // Entity key (max 1024 bytes, UTF-8)
  bytes value = 2; // Entity value (max 1MB)
  optional uint64 expires_at = 3; // Unix epoch seconds; 0 = never expires
  uint64 version = 4; // Block height when last modified (for conditional writes)
}

// =============================================================================
// Merkle Proof Types
// =============================================================================

enum Direction {
  DIRECTION_UNSPECIFIED = 0;
  DIRECTION_LEFT = 1;
  DIRECTION_RIGHT = 2;
}

// Read consistency levels for read operations.
// Trade-off between consistency and performance/availability.
enum ReadConsistency {
  READ_CONSISTENCY_UNSPECIFIED = 0; // Server default (typically EVENTUAL)
  READ_CONSISTENCY_EVENTUAL = 1; // Read from any replica (fastest, may be stale)
  READ_CONSISTENCY_LINEARIZABLE = 2; // Read from leader (strong consistency, higher latency)
}

// Merkle inclusion proof for transaction in block.
// Verification: recompute root from leaf_hash up through siblings.
// The leaf_hash is SHA-256(canonical_tx_encoding).
message MerkleProof {
  Hash leaf_hash = 1; // SHA-256 of transaction (not included separately)
  repeated MerkleSibling siblings = 2; // Siblings from leaf to root (bottom-up order)
}

message MerkleSibling {
  Hash hash = 1;
  Direction direction = 2; // Where sibling sits: LEFT means hash(sibling || current)
}

// Chain proof linking a trusted height to a response height.
// Used to verify that block at response_height descends from trusted_height.
//
// Ordering: headers[0].height == trusted_height + 1, ascending to response_height.
// The trusted header itself is NOT included (client already has it).
// Verification: chain previous_hash links and verify final header matches response.
//
// Example: trusted_height=100, response_height=103
//   headers = [BlockHeader(101), BlockHeader(102), BlockHeader(103)]
//   Verify: headers[0].previous_hash == sha256(trusted_header)
//           headers[1].previous_hash == sha256(headers[0])
//           headers[2].previous_hash == sha256(headers[1])
message ChainProof {
  repeated BlockHeader headers = 1; // Ascending height order, excludes trusted header
}

// State proof for entity existence verification.
// Unlike transaction proofs (O(log n) Merkle path), state proofs require
// bucket contents because state uses bucket-based hashing for O(1) writes.
message StateProof {
  bytes key = 1; // Entity key
  bytes value = 2; // Entity value
  uint64 expires_at = 3; // TTL (0 = never)
  uint64 version = 4; // Block height when last modified
  uint32 bucket_id = 5; // Bucket assignment (seahash(key) % 256)
  Hash bucket_root = 6; // Computed bucket root
  repeated Hash other_bucket_roots = 7; // 255 other bucket roots (index skips bucket_id)
  uint64 block_height = 8; // Block height this proof is valid for
  Hash state_root = 9; // Expected state_root (for verification)
}

// =============================================================================
// Read Service
// =============================================================================

service ReadService {
  // Read a value from the state tree (unverified, fastest)
  rpc Read(ReadRequest) returns (ReadResponse);

  // Batch read multiple keys in a single RPC call.
  // Amortizes network overhead across multiple reads for higher throughput.
  // All reads use the same organization/vault scope and consistency level.
  rpc BatchRead(BatchReadRequest) returns (BatchReadResponse);

  // Read with merkle proof for client-side verification.
  // Supports both current and historical reads via optional at_height.
  // Use include_chain_proof=true to verify against a trusted checkpoint.
  rpc VerifiedRead(VerifiedReadRequest) returns (VerifiedReadResponse);

  // Read state at a specific block height with proof.
  // Similar to VerifiedRead with at_height, but at_height is required.
  // Supports chain proofs for verification against trusted checkpoints.
  rpc HistoricalRead(HistoricalReadRequest) returns (HistoricalReadResponse);

  // Stream block announcements as they're committed (lightweight notifications)
  rpc WatchBlocks(WatchBlocksRequest) returns (stream BlockAnnouncement);

  // Get block by height
  rpc GetBlock(GetBlockRequest) returns (GetBlockResponse);

  // Get multiple blocks for sync/catchup (max 1000 blocks per request)
  rpc GetBlockRange(GetBlockRangeRequest) returns (GetBlockRangeResponse);

  // Get current chain tip
  rpc GetTip(GetTipRequest) returns (GetTipResponse);

  // Get client's last committed sequence (for recovery after client restart)
  rpc GetClientState(GetClientStateRequest) returns (GetClientStateResponse);

  // Query relationships with optional filters (uses dual indexes)
  rpc ListRelationships(ListRelationshipsRequest) returns (ListRelationshipsResponse);

  // Returns whether a direct relationship tuple (resource, relation, subject)
  // exists in the vault. This is the storage-primitive existence check —
  // it does NOT evaluate authorization policy, userset rewrites, or schema
  // inheritance. Policy evaluation happens in the Engine layer above;
  // Ledger only answers "is this tuple stored?"
  rpc CheckRelationship(CheckRelationshipRequest) returns (CheckRelationshipResponse);

  // List distinct resources matching a type prefix
  rpc ListResources(ListResourcesRequest) returns (ListResourcesResponse);

  // List entities matching a key prefix (for Control data queries)
  rpc ListEntities(ListEntitiesRequest) returns (ListEntitiesResponse);
}

message ReadRequest {
  OrganizationSlug organization = 1;
  optional VaultSlug vault = 2; // Omit for organization-level reads
  string key = 3;
  ReadConsistency consistency = 4; // Default: EVENTUAL (any replica)
  // Identity of the user performing this operation.
  UserSlug caller = 5;
}

message ReadResponse {
  optional bytes value = 1;
  uint64 block_height = 2;
}

// Batch read request: read multiple keys in a single RPC for higher throughput.
// All reads share the same organization, vault, and consistency level.
message BatchReadRequest {
  OrganizationSlug organization = 1;
  optional VaultSlug vault = 2;
  repeated string keys = 3;           // Keys to read (max 1000)
  ReadConsistency consistency = 4;    // Applied to all reads
  // Identity of the user performing this operation.
  UserSlug caller = 5;
}

// Batch read response: results for all requested keys.
message BatchReadResponse {
  repeated BatchReadResult results = 1;
  uint64 block_height = 2;            // Block height at time of read
}

// Result for a single key in a batch read.
message BatchReadResult {
  string key = 1;
  optional bytes value = 2;           // None if key not found
  bool found = 3;                     // Explicit found flag for clarity
}

// Verified read: retrieve state with cryptographic proofs for client-side verification.
// Always returns: block_header + merkle_proof (required for verification).
// Use case: Clients that verify state locally, don't trust the server.
//
// For historical reads WITHOUT proofs (audits, debugging), use HistoricalRead
// with include_proof=false to avoid proof generation overhead.
message VerifiedReadRequest {
  OrganizationSlug organization = 1;
  optional VaultSlug vault = 2; // Omit for organization-level reads
  string key = 3;
  optional uint64 at_height = 4; // Read at specific height (0 or omit = current)
  bool include_chain_proof = 5; // Also include chain proof to trusted_height
  optional uint64 trusted_height = 6; // Chain proof starts from this checkpoint
  // Identity of the user performing this operation.
  UserSlug caller = 7;
}

message VerifiedReadResponse {
  optional bytes value = 1;
  uint64 block_height = 2;
  BlockHeader block_header = 3;
  MerkleProof merkle_proof = 4;
  optional ChainProof chain_proof = 5;
}

// Historical read: retrieve state at a specific past block height.
// Use case: Audits, compliance queries, debugging past state.
// Performance: Requires snapshot reconstruction (5-20ms hot, 100ms-10s cold).
//
// For verified historical reads with proofs, prefer VerifiedRead(at_height) which
// is optimized for the verification use case. HistoricalRead is for unverified
// archival queries where proof generation would add unnecessary overhead.
message HistoricalReadRequest {
  OrganizationSlug organization = 1;
  optional VaultSlug vault = 2; // Omit for organization-level reads
  string key = 3;
  uint64 at_height = 4; // Required: block height to read from
  bool include_proof = 5; // Include block_header + merkle_proof (default: false)
  bool include_chain_proof = 6; // Also include chain proof (requires include_proof=true)
  optional uint64 trusted_height = 7; // Chain proof starts from this checkpoint
}

message HistoricalReadResponse {
  optional bytes value = 1; // None if key didn't exist at at_height
  uint64 block_height = 2; // Echoes at_height for confirmation
  // Proofs (present only if include_proof=true):
  optional BlockHeader block_header = 3;
  optional MerkleProof merkle_proof = 4;
  optional ChainProof chain_proof = 5; // Present if include_chain_proof was true
}

message WatchBlocksRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  // First block height to stream. Must be >= 1 (0 is rejected with INVALID_ARGUMENT).
  //
  // Streaming behavior:
  // 1. Historical replay: Streams committed blocks from start_height to current tip
  // 2. Real-time push: After historical replay, stream stays open and pushes new
  //    blocks as they are committed (zero-polling live synchronization)
  // 3. Stream lifetime: Remains open indefinitely until client disconnects
  //
  // Backpressure handling:
  // - Uses tokio::sync::broadcast internally with buffer size 1024
  // - Slow consumers that fall >1024 blocks behind receive a Lagged error
  // - On Lagged error, reconnect with start_height = last_received_height + 1
  //
  // Typical usage for live sync:
  //   stream = WatchBlocks(start_height = last_known_height + 1)
  //   for block in stream:
  //     process(block)
  //     last_known_height = block.height
  uint64 start_height = 3;
  // Identity of the user performing this operation.
  UserSlug caller = 4;
}

message GetBlockRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  uint64 height = 3;
}

message GetBlockResponse {
  Block block = 1;
}

// Fetch multiple blocks for sync/catchup.
// Use case: Client reconnecting after downtime needs to catch up.
message GetBlockRangeRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  uint64 start_height = 3; // First block to return (inclusive)
  uint64 end_height = 4; // Last block to return (inclusive), max range: 1000 blocks
}

message GetBlockRangeResponse {
  repeated Block blocks = 1; // Ordered by height ascending
  uint64 current_tip = 2; // Current chain tip (for client to know if more syncing needed)
}

message GetTipRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
}

message GetTipResponse {
  uint64 height = 1;
  Hash block_hash = 2;
  Hash state_root = 3;
}

message GetClientStateRequest {
  OrganizationSlug organization = 1;
  optional VaultSlug vault = 2; // Omit for organization-level writes
  ClientId client_id = 3;
}

message GetClientStateResponse {
  uint64 last_committed_sequence = 1;
}

message ListRelationshipsRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  optional string resource = 3; // Filter by resource (exact match)
  optional string relation = 4; // Filter by relation (exact match)
  optional string subject = 5; // Filter by subject (exact match)
  optional uint64 at_height = 6; // Read at specific height (0 or omit = current)
  uint32 limit = 7; // Max results (0 = default limit)
  // Opaque pagination cursor from previous response. Server-managed; do not parse or modify.
  // Encodes position and query context for consistent pagination across requests.
  string page_token = 8;
  ReadConsistency consistency = 9; // Default: EVENTUAL (any replica)
  // Identity of the user performing this operation.
  UserSlug caller = 10;
}

message ListRelationshipsResponse {
  repeated Relationship relationships = 1;
  uint64 block_height = 2;
  string next_page_token = 3; // Opaque cursor for next page; empty if no more results
}

message CheckRelationshipRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  string resource = 3;              // Format: "type:id" (max 512 chars total)
  string relation = 4;              // Relation name (max 64 chars)
  string subject = 5;               // Format: "type:id" or "type:id#relation" (max 512 chars)
  ReadConsistency consistency = 6;  // Default: EVENTUAL
  UserSlug caller = 7;              // Auth identity of the caller
}

message CheckRelationshipResponse {
  bool exists = 1;                  // True iff the exact tuple is present
  uint64 checked_at_height = 2;     // Block height at which the check was evaluated
}

message ListResourcesRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  string resource_type = 3; // Type prefix (e.g., "document" matches "document:*")
  optional uint64 at_height = 4; // Read at specific height (0 or omit = current)
  uint32 limit = 5; // Max results (0 = default limit)
  // Opaque pagination cursor from previous response. Server-managed; do not parse or modify.
  string page_token = 6;
  ReadConsistency consistency = 7; // Default: EVENTUAL (any replica)
  // Identity of the user performing this operation.
  UserSlug caller = 8;
}

message ListResourcesResponse {
  repeated string resources = 1; // Full resource IDs (e.g., ["document:1", "document:2"])
  uint64 block_height = 2;
  string next_page_token = 3; // Opaque cursor for next page; empty if no more results
}

message ListEntitiesRequest {
  OrganizationSlug organization = 1;
  string key_prefix = 2; // e.g., "user:", "_idx:email:", "session:"
  optional uint64 at_height = 3; // Read at specific height (0 or omit = current)
  bool include_expired = 4; // Include entities past expires_at (default: false)
  uint32 limit = 5; // Max results (0 = default limit)
  // Opaque pagination cursor from previous response. Server-managed; do not parse or modify.
  string page_token = 6;
  ReadConsistency consistency = 7; // Default: EVENTUAL (any replica)
  optional VaultSlug vault = 8; // Omit for organization-level entities
  // Identity of the user performing this operation.
  UserSlug caller = 9;
}

message ListEntitiesResponse {
  repeated Entity entities = 1;
  uint64 block_height = 2;
  string next_page_token = 3; // Opaque cursor for next page; empty if no more results
}

// =============================================================================
// Write Service
// =============================================================================

service WriteService {
  // Submit a transaction
  rpc Write(WriteRequest) returns (WriteResponse);

  // Submit multiple transactions in a batch
  rpc BatchWrite(BatchWriteRequest) returns (BatchWriteResponse);
}

message WriteRequest {
  OrganizationSlug organization = 1;
  optional VaultSlug vault = 2; // Required for relationships; omit for organization-level entities
  ClientId client_id = 3;
  bytes idempotency_key = 4; // 16-byte UUID for idempotent retries (server rejects reuse with different payload)
  repeated Operation operations = 5;
  bool include_tx_proof = 6; // Request block_header + tx_proof in response for verification
  // Identity of the user performing this operation.
  UserSlug caller = 7;
}

message WriteResponse {
  oneof result {
    WriteSuccess success = 1;
    WriteError error = 2;
  }
}

message WriteSuccess {
  TxId tx_id = 1;
  uint64 block_height = 2;
  // For client-side verification (both present or both absent):
  optional BlockHeader block_header = 3; // Contains tx_merkle_root for proof verification
  optional MerkleProof tx_proof = 4; // Proof tx is in block (verify against block_header.tx_merkle_root)
  uint64 assigned_sequence = 5; // Server-assigned sequence number for this write
}

// Detailed error for conditional write failures.
// Provides enough context for clients to retry with correct values.
message WriteError {
  WriteErrorCode code = 1;
  string key = 2; // Which key's condition failed (CAS errors)
  optional uint64 current_version = 3; // Actual version (for version mismatch)
  optional bytes current_value = 4; // Actual value (for value_equals mismatch, if small)
  string message = 5; // Human-readable error description

  // Idempotency recovery fields (populated for ALREADY_COMMITTED)
  optional TxId committed_tx_id = 6; // For ALREADY_COMMITTED: original tx_id
  optional uint64 committed_block_height = 7; // For ALREADY_COMMITTED: original block_height
  optional uint64 assigned_sequence = 8; // For ALREADY_COMMITTED: server-assigned sequence
}

enum WriteErrorCode {
  WRITE_ERROR_CODE_UNSPECIFIED = 0;
  WRITE_ERROR_CODE_KEY_EXISTS = 1; // not_exists condition failed: key already exists
  WRITE_ERROR_CODE_KEY_NOT_FOUND = 2; // version/value_equals condition: key doesn't exist
  WRITE_ERROR_CODE_VERSION_MISMATCH = 3; // version condition: block height differs
  WRITE_ERROR_CODE_VALUE_MISMATCH = 4; // value_equals condition: value differs

  // Idempotency errors
  WRITE_ERROR_CODE_ALREADY_COMMITTED = 5; // Duplicate: idempotency_key already committed (same payload)
  // Recovery: use committed_tx_id, committed_block_height, assigned_sequence
  WRITE_ERROR_CODE_IDEMPOTENCY_KEY_REUSED = 6; // Conflict: idempotency_key reused with different payload
  // Recovery: generate new idempotency_key and retry
}

// Error codes for read operations.
// Used in gRPC status details for structured error handling.
enum ReadErrorCode {
  READ_ERROR_CODE_UNSPECIFIED = 0;

  // Requested height is outside retention window (pruned from storage).
  // Recovery: Use a more recent height, or re-sync from current tip.
  // Pagination: If height becomes unavailable mid-pagination, restart
  // query at current tip with fresh page_token.
  READ_ERROR_CODE_HEIGHT_UNAVAILABLE = 1;
}

// Structured error details attached to gRPC `Status.details` for machine-readable
// error handling. SDK clients decode this to populate `SdkError` fields without
// parsing error message strings.
//
// Encoding: `prost::Message::encode_to_vec()` → `Status::with_details(bytes)`.
// Decoding: `ErrorDetails::decode(status.details())`.
//
// Backward-compatible: clients that don't parse details continue working
// unchanged — they still see the human-readable `Status.message`.
message ErrorDetails {
  // Machine-readable error code (numeric string, e.g., "3203").
  // Maps to `ErrorCode::as_u16()` from the types crate.
  string error_code = 1;
  // Whether the client should retry this operation.
  bool is_retryable = 2;
  // Suggested delay before retrying (milliseconds). Present only for
  // rate-limited or backpressure errors.
  optional int32 retry_after_ms = 3;
  // Structured key-value context (e.g., {"organization": "42", "field": "key"}).
  map<string, string> context = 4;
  // Human-readable recovery guidance (e.g., "Reduce request rate").
  optional string suggested_action = 5;
}

// Batch write with all-or-nothing atomicity.
//
// Semantics:
// - All writes are committed in a SINGLE block (shared block_height in response)
// - Writes are applied in ARRAY ORDER (writes[0] before writes[1], etc.)
// - If ANY write's condition fails (e.g., CAS mismatch), the ENTIRE batch fails
// - On failure, no writes are applied—the vault state is unchanged
//
// Idempotency: Uses BATCH-LEVEL client_id/idempotency_key (not per-write).
// The entire batch is the idempotency unit—retry with same (client_id, idempotency_key)
// returns the original result. Per-write values in operations[] are IGNORED.
//
// Use cases:
// - Multi-key transactions requiring atomic commit
// - Ordered operations where later writes depend on earlier writes' effects
message BatchWriteRequest {
  OrganizationSlug organization = 1;
  optional VaultSlug vault = 2; // All writes target same vault scope
  ClientId client_id = 3; // Batch-level idempotency (per-write client_id ignored)
  bytes idempotency_key = 4; // 16-byte UUID for idempotent retries (server rejects reuse with different payload)
  repeated BatchWriteOperation operations = 5; // Operations in this batch
  bool include_tx_proofs = 6; // Request block_header + tx_proofs in response for verification
  // Identity of the user performing this operation.
  UserSlug caller = 7;
}

// Logical grouping of operations within a BatchWriteRequest.
// Purpose: Allows expressing ordered operation groups within an atomic batch.
// Processing: Groups are processed in array order (operations[0], then operations[1], etc.)
//             All groups share the batch's organization, vault, client_id, and idempotency_key.
// Atomicity: The ENTIRE batch is atomic—if any operation fails, no changes are applied.
message BatchWriteOperation {
  repeated Operation operations = 1; // Operations in this group
}

// Response for batch write.
// All-or-nothing: either all writes succeed or none are applied.
message BatchWriteResponse {
  oneof result {
    BatchWriteSuccess success = 1;
    WriteError error = 2; // First failing write; no writes applied
  }
}

message BatchWriteSuccess {
  TxId tx_id = 1; // Single transaction ID for entire batch
  uint64 block_height = 2; // Block containing this transaction
  // For client-side verification (optional):
  optional BlockHeader block_header = 3; // Contains tx_merkle_root for proof verification
  optional MerkleProof tx_proof = 4; // Proof this tx is in block
  uint64 assigned_sequence = 5; // Server-assigned sequence number for this batch
}

// =============================================================================
// Organization Service
// =============================================================================

service OrganizationService {
  // Create a new organization. An OrganizationSlug (Snowflake ID) is generated
  // and returned. Internal sequential OrganizationId is never exposed.
  rpc CreateOrganization(CreateOrganizationRequest) returns (CreateOrganizationResponse);

  // Delete an organization (marks for garbage collection, fails if vaults exist)
  rpc DeleteOrganization(DeleteOrganizationRequest) returns (DeleteOrganizationResponse);

  // Get organization info including region assignment.
  // Lookup by slug only — organization names are not unique.
  rpc GetOrganization(GetOrganizationRequest) returns (GetOrganizationResponse);

  // List all organizations (paginated)
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse);

  // Migrate an organization from one region to another.
  // Non-protected to non-protected is metadata-only (no data movement).
  // Protected region migrations involve full data transfer via saga.
  // Writes to the organization are rejected during migration.
  rpc MigrateOrganization(MigrateOrganizationRequest) returns (MigrateOrganizationResponse);

  // Update organization metadata. Only organization administrators can update.
  // Returns the full updated organization (same shape as GetOrganizationResponse).
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (UpdateOrganizationResponse);

  // List all members of an organization. Caller must be a member.
  rpc ListOrganizationMembers(ListOrganizationMembersRequest) returns (ListOrganizationMembersResponse);

  // Remove a member from an organization.
  // Self-removal: any member can leave unless they are the last admin.
  // Removing others: initiator must be an admin.
  rpc RemoveOrganizationMember(RemoveOrganizationMemberRequest) returns (RemoveOrganizationMemberResponse);

  // Promote or demote an organization member.
  // Initiator must be an admin. Cannot demote the last admin.
  rpc UpdateOrganizationMemberRole(UpdateOrganizationMemberRoleRequest) returns (UpdateOrganizationMemberRoleResponse);

  // List all teams in an organization.
  rpc ListOrganizationTeams(ListOrganizationTeamsRequest) returns (ListOrganizationTeamsResponse);

  // Create a new team within an organization.
  // A TeamSlug (Snowflake ID) is generated and returned.
  rpc CreateOrganizationTeam(CreateOrganizationTeamRequest) returns (CreateOrganizationTeamResponse);

  // Delete a team. Optionally move members to another team before deletion.
  rpc DeleteOrganizationTeam(DeleteOrganizationTeamRequest) returns (DeleteOrganizationTeamResponse);

  // Update team metadata. Only organization admins or team managers can update.
  rpc UpdateOrganizationTeam(UpdateOrganizationTeamRequest) returns (UpdateOrganizationTeamResponse);

  // Get a single team by slug. Caller must be an org member.
  // Non-admin members can only see teams they belong to.
  rpc GetOrganizationTeam(GetOrganizationTeamRequest) returns (GetOrganizationTeamResponse);

  // Add a member to a team. Caller must be org admin or team manager.
  rpc AddTeamMember(AddTeamMemberRequest) returns (AddTeamMemberResponse);

  // Remove a member from a team. Caller must be org admin or team manager.
  rpc RemoveTeamMember(RemoveTeamMemberRequest) returns (RemoveTeamMemberResponse);

  // Update a team member's role. Caller must be org admin or team manager.
  rpc UpdateTeamMemberRole(UpdateTeamMemberRoleRequest) returns (UpdateTeamMemberRoleResponse);
}

// =============================================================================
// Vault Service
// =============================================================================

service VaultService {
  // Create a new vault
  rpc CreateVault(CreateVaultRequest) returns (CreateVaultResponse);

  // Delete a vault (marks for garbage collection)
  rpc DeleteVault(DeleteVaultRequest) returns (DeleteVaultResponse);

  // Get vault info
  rpc GetVault(GetVaultRequest) returns (GetVaultResponse);

  // List all vaults on this node
  rpc ListVaults(ListVaultsRequest) returns (ListVaultsResponse);

  // Update vault metadata (retention policy).
  rpc UpdateVault(UpdateVaultRequest) returns (UpdateVaultResponse);
}

// =============================================================================
// Schema Service
// =============================================================================

// Manages versioned schema definitions within a vault's entity store.
// Schemas are JSON blobs with version tracking and activation semantics.
service SchemaService {
  // Deploy a new schema version (atomic version + pointer write).
  rpc DeploySchema(DeploySchemaRequest) returns (DeploySchemaResponse);

  // List all schema versions without loading definitions (avoids N+1).
  rpc ListSchemaVersions(ListSchemaVersionsRequest) returns (ListSchemaVersionsResponse);

  // Get a single schema version with its definition.
  rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse);

  // Activate a specific schema version (atomic pointer update).
  rpc ActivateSchema(ActivateSchemaRequest) returns (ActivateSchemaResponse);

  // Rollback to the previous activated version (not just current-1).
  rpc RollbackSchema(RollbackSchemaRequest) returns (RollbackSchemaResponse);

  // Get the currently active schema version and definition.
  rpc GetActiveSchema(GetActiveSchemaRequest) returns (GetActiveSchemaResponse);

  // Compare two schema versions.
  rpc DiffSchemas(DiffSchemasRequest) returns (DiffSchemasResponse);
}

message DeploySchemaRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  bytes definition = 3;              // JSON schema definition
  optional uint32 version = 4;       // Explicit version, or auto-increment
  optional string description = 5;
  // Identity of the user performing this operation.
  UserSlug caller = 6;
}

message DeploySchemaResponse {
  uint32 version = 1;
  string status = 2;
}

message ListSchemaVersionsRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  // Identity of the user performing this operation.
  UserSlug caller = 3;
}

message SchemaVersionEntry {
  uint32 version = 1;
  bool has_definition = 2;
  bool is_active = 3;
}

message ListSchemaVersionsResponse {
  repeated SchemaVersionEntry versions = 1;
}

message GetSchemaRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  uint32 version = 3;
  // Identity of the user performing this operation.
  UserSlug caller = 4;
}

message GetSchemaResponse {
  uint32 version = 1;
  bytes definition = 2;              // JSON schema definition
  optional string description = 3;
}

message ActivateSchemaRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  uint32 version = 3;
  // Identity of the user performing this operation.
  UserSlug caller = 4;
}

message ActivateSchemaResponse {
  uint32 version = 1;
  string status = 2;
}

message RollbackSchemaRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  // Identity of the user performing this operation.
  UserSlug caller = 3;
}

message RollbackSchemaResponse {
  uint32 version = 1;
  string status = 2;
}

message GetActiveSchemaRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  // Identity of the user performing this operation.
  UserSlug caller = 3;
}

message GetActiveSchemaResponse {
  uint32 version = 1;
  bytes definition = 2;
  optional string description = 3;
}

message DiffSchemasRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  uint32 from_version = 3;
  uint32 to_version = 4;
  // Identity of the user performing this operation.
  UserSlug caller = 5;
}

message DiffFieldChange {
  string field = 1;
  string change_type = 2;            // "added", "removed", "changed"
}

message DiffSchemasResponse {
  uint32 from_version = 1;
  uint32 to_version = 2;
  repeated DiffFieldChange changes = 3;
}

// =============================================================================
// Admin Service
// =============================================================================

service AdminService {
  // ==========================================================================
  // Cluster Membership
  // ==========================================================================

  // Request to join an existing cluster. Called by a new node contacting a peer.
  // The receiving node forwards to the leader, which adds the node as a learner,
  // waits for it to catch up, then promotes to voter.
  rpc JoinCluster(JoinClusterRequest) returns (JoinClusterResponse);

  // Initiates graceful decommission. Sets NodeStatus to Decommissioning.
  // The DR scheduler drains replicas asynchronously. Poll GetDecommissionStatus for progress.
  rpc LeaveCluster(LeaveClusterRequest) returns (LeaveClusterResponse);

  // Returns decommission progress for a node.
  rpc GetDecommissionStatus(GetDecommissionStatusRequest) returns (GetDecommissionStatusResponse);

  // Checks whether this node has recently heard from a target peer.
  // Used by the GLOBAL leader for quorum-based dead node detection.
  rpc CheckPeerLiveness(CheckPeerLivenessRequest) returns (CheckPeerLivenessResponse);

  // Get current cluster membership information.
  rpc GetClusterInfo(GetClusterInfoRequest) returns (GetClusterInfoResponse);

  // Get node information for pre-bootstrap coordination.
  // Available even before cluster is formed. Used by nodes to discover
  // each other's Snowflake IDs and determine who should bootstrap.
  rpc GetNodeInfo(GetNodeInfoRequest) returns (GetNodeInfoResponse);

  // Initialize a new cluster. One-time operation per cluster lifetime.
  // Creates the GLOBAL shard with all known peers as voters, generates a
  // cluster_id, and transitions the node from Uninitialized to Running.
  // Idempotent: returns AlreadyInitialized if the cluster was already created.
  rpc InitCluster(InitClusterRequest) returns (InitClusterResponse);

  // Transfer leadership to a specific node before shutdown or maintenance.
  // If target_node_id is 0, the leader picks the most caught-up follower.
  // Returns once the target has won the election or the timeout expires.
  rpc TransferLeadership(TransferLeadershipRequest) returns (TransferLeadershipResponse);

  // ==========================================================================
  // Maintenance Operations
  // ==========================================================================

  // Trigger snapshot
  rpc CreateSnapshot(CreateSnapshotRequest) returns (CreateSnapshotResponse);

  // Run integrity check
  rpc CheckIntegrity(CheckIntegrityRequest) returns (CheckIntegrityResponse);

  // Recover a diverged vault by replaying blocks from archive.
  // This clears the vault's state, replays transactions from block archive,
  // and verifies state roots match. Only works on diverged vaults unless force=true.
  rpc RecoverVault(RecoverVaultRequest) returns (RecoverVaultResponse);

  // Simulate vault divergence for testing.
  // Forces a vault into the Diverged state without actual state corruption.
  // Intended for testing and debugging; available in all builds.
  rpc SimulateDivergence(SimulateDivergenceRequest) returns (SimulateDivergenceResponse);

  // Force a garbage collection cycle for expired entities.
  // Useful for testing TTL behavior and operational debugging.
  // Only the leader can run GC; followers return an error.
  rpc ForceGc(ForceGcRequest) returns (ForceGcResponse);

  // Update runtime-reconfigurable parameters without server restart.
  // Supports rate limit thresholds, hot key detection, compaction intervals,
  // and validation limits. Non-reconfigurable parameters (listen address,
  // data directory, Raft topology) are rejected with INVALID_ARGUMENT.
  // Set dry_run=true to validate without applying changes.
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);

  // Get the current runtime configuration.
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);

  // ==========================================================================
  // Backup & Restore
  // ==========================================================================

  // Create a backup of the current region state.
  // Triggers a consistent snapshot, compresses it, and writes to the configured
  // backup destination. Includes chain commitment for integrity verification.
  rpc CreateBackup(CreateBackupRequest) returns (CreateBackupResponse);

  // List available backups with metadata.
  rpc ListBackups(ListBackupsRequest) returns (ListBackupsResponse);

  // Restore from a backup. Stops the region, restores state from backup,
  // and resumes. Requires explicit confirmation via the confirm field.
  rpc RestoreBackup(RestoreBackupRequest) returns (RestoreBackupResponse);

  // ==========================================================================
  // Blinding Key Rotation
  // ==========================================================================

  // Initiate rotation of the email blinding key. Triggers asynchronous
  // re-hashing of all email HMAC entries in the global control plane.
  // Returns immediately; poll GetBlindingKeyRehashStatus for progress.
  rpc RotateBlindingKey(RotateBlindingKeyRequest) returns (RotateBlindingKeyResponse);

  // Check the progress of an in-flight blinding key rotation.
  rpc GetBlindingKeyRehashStatus(GetBlindingKeyRehashStatusRequest) returns (GetBlindingKeyRehashStatusResponse);

  // ==========================================================================
  // Region Key Rotation
  // ==========================================================================

  // Initiate rotation of the Region Master Key (RMK) for a region.
  // Triggers asynchronous DEK re-wrapping of all page sidecar metadata.
  // Returns immediately; poll GetRewrapStatus for progress.
  rpc RotateRegionKey(RotateRegionKeyRequest) returns (RotateRegionKeyResponse);

  // Check the progress of an in-flight DEK re-wrapping job.
  rpc GetRewrapStatus(GetRewrapStatusRequest) returns (GetRewrapStatusResponse);

  // ==========================================================================
  // User Migration (flat _system → regional)
  // ==========================================================================

  // Migrate existing users from flat _system store to regional directory
  // structure. One-time admin operation for pre-release data migration.
  // Idempotent — re-run skips already-migrated users.
  rpc MigrateExistingUsers(MigrateExistingUsersRequest) returns (MigrateExistingUsersResponse);

  // Eagerly provision a Raft group for a region without assigning data.
  // Normally regional groups are created lazily on first organization or
  // user assignment. This RPC allows pre-provisioning for capacity planning.
  rpc ProvisionRegion(ProvisionRegionRequest) returns (ProvisionRegionResponse);
}

// -----------------------------------------------------------------------------
// Organization Messages
// -----------------------------------------------------------------------------

// Create a new organization. An OrganizationSlug (Snowflake ID) is generated
// by the leader and returned. Every organization must declare a region
// governing where its data is stored.
message CreateOrganizationRequest {
  string name = 1; // Human-readable name (e.g., "acme_corp")
  Region region = 2; // Data residency region (required)
  optional OrganizationTier tier = 3; // Billing tier (Free if not specified)
  UserSlug caller = 4; // Identity of the user performing this operation.
}

message CreateOrganizationResponse {
  OrganizationSlug slug = 1;
  string name = 2;
  Region region = 3;                // Data residency region
  repeated NodeId member_nodes = 4; // Nodes in the region's Raft group
  OrganizationStatus status = 5;    // Lifecycle state
  uint64 config_version = 6;        // For cache invalidation
  google.protobuf.Timestamp created_at = 7;
  OrganizationTier tier = 8;        // Billing tier
  repeated OrganizationMember members = 9; // Organization members with roles
  google.protobuf.Timestamp updated_at = 10;
}

message DeleteOrganizationRequest {
  OrganizationSlug slug = 1;
  UserSlug caller = 2; // Identity of the user performing this operation.
}

message DeleteOrganizationResponse {
  google.protobuf.Timestamp deleted_at = 1;
  uint32 retention_days = 2; // Region-derived cooldown before purge
}

// Get organization info by slug. Caller must be a member of the organization.
message GetOrganizationRequest {
  OrganizationSlug slug = 1;
  UserSlug caller = 2; // Must be an organization member
}

// Organization info (routing metadata from _system)
// Note: leader_hint is computed dynamically from Raft state via GetSystemState
message GetOrganizationResponse {
  OrganizationSlug slug = 1;
  string name = 2;
  Region region = 3;                // Data residency region
  repeated NodeId member_nodes = 4; // Nodes in the region's Raft group
  OrganizationStatus status = 5;    // Lifecycle state
  uint64 config_version = 6;        // For cache invalidation
  google.protobuf.Timestamp created_at = 7;
  OrganizationTier tier = 8;        // Billing tier
  repeated OrganizationMember members = 9; // Organization members with roles
  google.protobuf.Timestamp updated_at = 10;
}

enum OrganizationStatus {
  ORGANIZATION_STATUS_UNSPECIFIED = 0;
  ORGANIZATION_STATUS_ACTIVE = 1;       // Accepting requests
  ORGANIZATION_STATUS_MIGRATING = 2;    // Being migrated to another region
  ORGANIZATION_STATUS_SUSPENDED = 3;    // Billing or policy suspension
  ORGANIZATION_STATUS_DELETED = 4;      // Tombstone (soft-deleted, pending purge)
  ORGANIZATION_STATUS_PROVISIONING = 5; // Saga in progress, not yet ready
}

enum OrganizationTier {
  ORGANIZATION_TIER_UNSPECIFIED = 0;
  ORGANIZATION_TIER_FREE = 1;        // Free tier (default)
  ORGANIZATION_TIER_LAUNCH = 2;      // Launch tier
  ORGANIZATION_TIER_SCALE = 3;       // Scale tier
}

enum OrganizationMemberRole {
  ORGANIZATION_MEMBER_ROLE_UNSPECIFIED = 0;
  ORGANIZATION_MEMBER_ROLE_ADMIN = 1;  // Organization administrator
  ORGANIZATION_MEMBER_ROLE_MEMBER = 2; // Regular member
}

message OrganizationMember {
  UserSlug user = 1;
  OrganizationMemberRole role = 2;
  google.protobuf.Timestamp joined_at = 3;
}

message ListOrganizationsRequest {
  optional bytes page_token = 1;
  uint32 page_size = 2; // Default: 100, Max: 1000
  UserSlug caller = 3; // For authorization filtering
}

message ListOrganizationsResponse {
  repeated GetOrganizationResponse organizations = 1;
  optional bytes next_page_token = 2; // Absent if no more pages
}

// Migrate organization to a different region.
// Protected → non-protected requires acknowledge_residency_downgrade = true.
message MigrateOrganizationRequest {
  OrganizationSlug slug = 1;
  Region target_region = 2;
  bool acknowledge_residency_downgrade = 3;
  UserSlug caller = 4; // Identity of the user performing this operation.
}

// Migration response with source/target region and current status.
// Status will be MIGRATING while the saga is in progress.
message MigrateOrganizationResponse {
  OrganizationSlug slug = 1;
  Region source_region = 2;
  Region target_region = 3;
  OrganizationStatus status = 4;
}

// Update organization metadata.
// At least one optional field must be set.
message UpdateOrganizationRequest {
  OrganizationSlug slug = 1;
  UserSlug caller = 2; // Identity of the user performing this operation.
  optional string name = 3; // New name (1-200 chars, validated)
}

// Returns the full updated organization (mirrors GetOrganizationResponse).
message UpdateOrganizationResponse {
  OrganizationSlug slug = 1;
  string name = 2;
  Region region = 3;
  repeated NodeId member_nodes = 4;
  OrganizationStatus status = 5;
  uint64 config_version = 6;
  google.protobuf.Timestamp created_at = 7;
  OrganizationTier tier = 8;
  repeated OrganizationMember members = 9;
  google.protobuf.Timestamp updated_at = 10;
}

// List members of an organization. Caller must be a member.
message ListOrganizationMembersRequest {
  OrganizationSlug slug = 1;
  UserSlug caller = 2; // Must be an organization member
  optional bytes page_token = 3; // Opaque cursor
  uint32 page_size = 4; // Max items per page
}

message ListOrganizationMembersResponse {
  repeated OrganizationMember members = 1;
  optional bytes next_page_token = 2; // Absent if no more pages
}

// Remove a member from an organization.
// Self-removal: any member unless they are the last admin.
// Removing others: initiator must be an admin.
message RemoveOrganizationMemberRequest {
  OrganizationSlug slug = 1;
  UserSlug caller = 2;
  UserSlug target = 3;
}

message RemoveOrganizationMemberResponse {}

// Promote or demote a member within an organization.
// Initiator must be an admin. Cannot demote the last admin.
message UpdateOrganizationMemberRoleRequest {
  OrganizationSlug slug = 1;
  UserSlug caller = 2;
  UserSlug target = 3;
  OrganizationMemberRole role = 4;
}

message UpdateOrganizationMemberRoleResponse {
  OrganizationMember member = 1; // Updated member state
}

// -----------------------------------------------------------------------------
// Organization Team Messages
// -----------------------------------------------------------------------------

// Role within a team.
enum OrganizationTeamMemberRole {
  ORGANIZATION_TEAM_MEMBER_ROLE_UNSPECIFIED = 0;
  ORGANIZATION_TEAM_MEMBER_ROLE_MANAGER = 1; // Can manage team settings
  ORGANIZATION_TEAM_MEMBER_ROLE_MEMBER = 2;  // Regular team member
}

// A member of a team.
message OrganizationTeamMember {
  UserSlug user = 1;
  OrganizationTeamMemberRole role = 2;
  google.protobuf.Timestamp joined_at = 3;
}

// Full team representation returned in responses.
message OrganizationTeam {
  TeamSlug slug = 1;
  OrganizationSlug organization = 2;
  string name = 3;
  repeated OrganizationTeamMember members = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// List all teams in an organization.
message ListOrganizationTeamsRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2; // For authorization filtering
  optional bytes page_token = 3; // Opaque cursor
  uint32 page_size = 4; // Max items per page
}

message ListOrganizationTeamsResponse {
  repeated OrganizationTeam teams = 1;
  optional bytes next_page_token = 2; // Absent if no more pages
}

// Create a new team. Name must be unique within the organization.
message CreateOrganizationTeamRequest {
  OrganizationSlug organization = 1;
  string name = 2;           // Unique within organization (1-200 chars)
  UserSlug caller = 3;    // Identity of the user performing this operation.
}

message CreateOrganizationTeamResponse {
  OrganizationTeam team = 1;
}

// Delete a team. Optionally move members to another team before deletion.
message DeleteOrganizationTeamRequest {
  TeamSlug slug = 1;
  // If set, move all members to this team before deleting.
  // If not set, members are simply removed from the team.
  optional TeamSlug move_members_to = 2;
  UserSlug caller = 3;        // Identity of the user performing this operation.
}

message DeleteOrganizationTeamResponse {}

// Update team metadata. Only organization admins or team managers can update.
message UpdateOrganizationTeamRequest {
  TeamSlug slug = 1;
  UserSlug caller = 2;        // Identity of the user performing this operation.
  optional string name = 3;      // New name (1-200 chars, unique within org)
}

message UpdateOrganizationTeamResponse {
  OrganizationTeam team = 1;
}

// Get a single team by slug. Caller must be an organization member.
// Non-admin members can only see teams they belong to.
message GetOrganizationTeamRequest {
  TeamSlug slug = 1;
  UserSlug caller = 2; // Must be an organization member
}

message GetOrganizationTeamResponse {
  OrganizationTeam team = 1;
}

message AddTeamMemberRequest {
  TeamSlug team = 1;
  UserSlug user = 2;
  OrganizationTeamMemberRole role = 3;
  UserSlug caller = 4; // Identity of the user performing this operation.
}

message AddTeamMemberResponse {
  OrganizationTeam team = 1;
}

message RemoveTeamMemberRequest {
  TeamSlug team = 1;
  UserSlug user = 2;
  UserSlug caller = 3; // Identity of the user performing this operation.
}

message RemoveTeamMemberResponse {}

message UpdateTeamMemberRoleRequest {
  TeamSlug team = 1;
  UserSlug user = 2;
  OrganizationTeamMemberRole role = 3;
  UserSlug caller = 4; // Identity of the user performing this operation.
}

message UpdateTeamMemberRoleResponse {
  OrganizationTeam team = 1;
}

// Request to migrate a user's PII to a different region.
message MigrateUserRegionRequest {
  UserSlug slug = 1;
  Region target_region = 2;
  // Identity of the user performing this operation.
  UserSlug caller = 3;
}

// Migration response with source/target region and current directory status.
message MigrateUserRegionResponse {
  UserSlug slug = 1;
  Region source_region = 2;
  Region target_region = 3;
  // User directory status will be MIGRATING while the saga is in progress.
  string directory_status = 4;
}

// -----------------------------------------------------------------------------
// Vault Messages
// -----------------------------------------------------------------------------

// Create a new vault. A VaultSlug (Snowflake ID) is generated
// and returned. Internal sequential VaultId is never exposed.
message CreateVaultRequest {
  OrganizationSlug organization = 1;
  uint32 replication_factor = 2;
  repeated NodeId initial_nodes = 3;
  optional BlockRetentionPolicy retention_policy = 4; // Default: FULL
  // Identity of the user performing this operation.
  UserSlug caller = 5;
}

// Block retention modes for storage/compliance trade-off.
enum BlockRetentionMode {
  BLOCK_RETENTION_MODE_UNSPECIFIED = 0;
  // Keep all blocks with full transactions indefinitely.
  // Use case: SOC 2, HIPAA compliance requiring full audit trail.
  BLOCK_RETENTION_MODE_FULL = 1;
  // After snapshot, remove transaction bodies for old blocks (headers preserved).
  // Use case: High-volume workloads prioritizing storage efficiency.
  BLOCK_RETENTION_MODE_COMPACTED = 2;
}

message BlockRetentionPolicy {
  // Both fields are `optional` (proto3 optional / explicit presence) so the
  // wire format can distinguish "not set" from "set to zero / UNSPECIFIED".
  // `TryFrom<proto::BlockRetentionPolicy>` rejects messages with either field
  // absent instead of silently substituting defaults — a malformed client
  // cannot quietly configure the wrong retention policy.
  optional BlockRetentionMode mode = 1;
  // For COMPACTED mode: blocks newer than tip - retention_blocks keep full transactions.
  // Ignored for FULL mode.
  optional uint64 retention_blocks = 2;
}

message CreateVaultResponse {
  VaultSlug vault = 1;
  BlockHeader genesis = 2;
}

message DeleteVaultRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  // Identity of the user performing this operation.
  UserSlug caller = 3;
}

message DeleteVaultResponse {
  google.protobuf.Timestamp deleted_at = 1;
}

message GetVaultRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  // Identity of the user performing this operation.
  UserSlug caller = 3;
}

message GetVaultResponse {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  uint64 height = 3;
  Hash state_root = 4;
  repeated NodeId nodes = 5;
  NodeId leader = 6;
  VaultStatus status = 7;
  BlockRetentionPolicy retention_policy = 8;
}

enum VaultStatus {
  VAULT_STATUS_UNSPECIFIED = 0;
  VAULT_STATUS_ACTIVE = 1;
  VAULT_STATUS_READ_ONLY = 2;
  VAULT_STATUS_DELETED = 3;
}

message ListVaultsRequest {
  optional bytes page_token = 1; // Opaque cursor
  uint32 page_size = 2; // Max items per page
  optional OrganizationSlug organization = 3; // Filter by organization
  // Identity of the user performing this operation.
  UserSlug caller = 4;
}

message ListVaultsResponse {
  repeated GetVaultResponse vaults = 1;
  optional bytes next_page_token = 2; // Absent if no more pages
}

// Update vault metadata. Currently supports updating retention policy.
message UpdateVaultRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  optional BlockRetentionPolicy retention_policy = 3;
  // Identity of the user performing this operation.
  UserSlug caller = 4;
}

message UpdateVaultResponse {}

message CreateSnapshotRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
}

message CreateSnapshotResponse {
  uint64 block_height = 1;
  Hash state_root = 2;
  string snapshot_path = 3;
}

message CheckIntegrityRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  bool full_check = 3; // Replay from genesis vs quick check
}

message CheckIntegrityResponse {
  bool healthy = 1;
  repeated IntegrityIssue issues = 2;
}

message IntegrityIssue {
  uint64 block_height = 1;
  string issue_type = 2; // "chain_break", "state_divergence", etc.
  string description = 3;
}

// Recover a diverged vault by replaying blocks from archive.
message RecoverVaultRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  // Force recovery even if vault is healthy (for testing/maintenance).
  // Required for manual intervention after automatic recovery exhausted.
  bool force = 3;
}

message RecoverVaultResponse {
  bool success = 1;
  string message = 2; // Error details if !success
  // New vault health status after recovery attempt.
  VaultHealthProto health_status = 3;
  // Final block height after recovery.
  uint64 final_height = 4;
  // Final state root after recovery (should match expected).
  Hash final_state_root = 5;
}

// Request to simulate vault divergence for testing.
// This forces a vault into the Diverged state without actual corruption.
message SimulateDivergenceRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  // Expected state root (fake value for simulation).
  Hash expected_state_root = 3;
  // Computed state root (fake value for simulation).
  Hash computed_state_root = 4;
  // Height at which "divergence" occurred.
  uint64 at_height = 5;
}

message SimulateDivergenceResponse {
  bool success = 1;
  string message = 2;
  // Vault health status after simulation (should be DIVERGED).
  VaultHealthProto health_status = 3;
}

// Force a garbage collection cycle for expired entities.
// If organization and vault are specified, only that vault is scanned.
// If omitted, all vaults are scanned (cluster-wide GC).
message ForceGcRequest {
  optional OrganizationSlug organization = 1;
  optional VaultSlug vault = 2;
}

message ForceGcResponse {
  bool success = 1;
  string message = 2;
  // Number of expired entities that were removed.
  uint64 expired_count = 3;
  // Number of vaults that were scanned.
  uint64 vaults_scanned = 4;
}

// Vault health status (mirrors internal VaultHealthStatus enum).
enum VaultHealthProto {
  VAULT_HEALTH_PROTO_UNSPECIFIED = 0;
  VAULT_HEALTH_PROTO_HEALTHY = 1;
  VAULT_HEALTH_PROTO_DIVERGED = 2;
  VAULT_HEALTH_PROTO_RECOVERING = 3;
}

// -----------------------------------------------------------------------------
// User Management Messages
// -----------------------------------------------------------------------------

message CreateUserRequest {
  string name = 1;                // Display name (1-200 characters)
  string email = 2;               // Primary email address (normalized to lowercase)
  Region region = 3;              // Region for PII storage
  optional UserRole role = 4;     // Default: USER
  string email_hmac = 5;          // HMAC-SHA256 of normalized email (hex, caller-computed with blinding key)
  string organization_name = 6;   // Name for the default organization
  optional OrganizationTier organization_tier = 7; // Tier for default org (Free if not specified)
}

message CreateUserResponse {
  UserSlug slug = 1;
  User user = 2;
  optional OrganizationSlug default_organization_slug = 3; // Slug of the default org (populated after saga completes)
}

message GetUserRequest {
  UserSlug slug = 1;
  // Identity of the user performing this operation.
  UserSlug caller = 2;
}

message GetUserResponse {
  User user = 1;
  repeated UserEmail emails = 2;  // All emails for this user
}

message UpdateUserRequest {
  UserSlug slug = 1;
  optional string name = 2;              // New display name
  optional UserRole role = 3;            // New role
  optional UserEmailId primary_email = 4; // Change primary email (must be owned by user)
  // Identity of the user performing this operation.
  UserSlug caller = 5;
}

message UpdateUserResponse {
  User user = 1;
}

message DeleteUserRequest {
  UserSlug slug = 1;
  UserSlug caller = 2;          // Identity of the user performing this operation.
}

message DeleteUserResponse {
  UserSlug slug = 1;
  google.protobuf.Timestamp deleted_at = 2;
  uint32 retention_days = 3;      // Region-specific retention period (derived from user's region)
}

message ListUsersRequest {
  optional bytes page_token = 1;
  uint32 page_size = 2;           // Default: 100, Max: 1000
  optional Region region = 3;     // Filter by region
  // Identity of the user performing this operation.
  UserSlug caller = 4;
}

message ListUsersResponse {
  repeated User users = 1;
  optional bytes next_page_token = 2;
}

// Flexible search filter — optional fields are AND-combined.
// At least one filter field must be set.
message UserSearchFilter {
  optional string email = 1;          // Email prefix or exact match
  optional UserStatus status = 2;     // Filter by lifecycle state
  optional UserRole role = 3;         // Filter by role
  optional string name_prefix = 4;    // Display name prefix match
}

message SearchUsersRequest {
  UserSearchFilter filter = 1;
  optional bytes page_token = 2;
  uint32 page_size = 3;           // Default: 100, Max: 1000
  // Identity of the user performing this operation.
  UserSlug caller = 4;
}

message SearchUsersResponse {
  repeated User users = 1;
  optional bytes next_page_token = 2;
}

// -----------------------------------------------------------------------------
// User Email Management Messages
// -----------------------------------------------------------------------------

message CreateUserEmailRequest {
  UserSlug user = 1;              // Owning user
  string email = 2;               // Email address to add
  string email_hmac = 3;          // HMAC-SHA256 of normalized email (hex). Goes to GLOBAL; plaintext stays regional.
  // Identity of the user performing this operation.
  UserSlug caller = 4;
}

message CreateUserEmailResponse {
  UserEmail email = 1;
}

message DeleteUserEmailRequest {
  UserSlug user = 1;
  UserEmailId email_id = 2;       // Email to remove (cannot be primary)
  // Identity of the user performing this operation.
  UserSlug caller = 3;
}

message DeleteUserEmailResponse {
  google.protobuf.Timestamp deleted_at = 1;
}

message UserEmailSearchFilter {
  optional string email = 1;          // Email prefix or exact match
  optional UserSlug user = 2;         // Filter by owning user
  optional bool verified_only = 3;    // Only return verified emails
}

message SearchUserEmailRequest {
  UserEmailSearchFilter filter = 1;
  optional bytes page_token = 2;
  uint32 page_size = 3;
  // Identity of the user performing this operation.
  UserSlug caller = 4;
}

message SearchUserEmailResponse {
  repeated UserEmail emails = 1;
  optional bytes next_page_token = 2;
}

message VerifyUserEmailRequest {
  string token = 1;               // 64-char hex verification token
}

message VerifyUserEmailResponse {
  UserEmail email = 1;            // Updated email with verified_at set
}

// -----------------------------------------------------------------------------
// Onboarding Messages
// -----------------------------------------------------------------------------

// Start email verification for user onboarding.
message InitiateEmailVerificationRequest {
  string email = 1;               // Plaintext email address
  Region region = 2;              // Data residency region for this email
}

// The verification code to send to the user's email.
message InitiateEmailVerificationResponse {
  string code = 1;                // 6-character verification code (A-Z, 0-9)
}

// Verify the code the user received via email.
message VerifyEmailCodeRequest {
  string email = 1;               // Same email used in initiation
  string code = 2;                // Code from the email
  Region region = 3;              // Same region used in initiation
}

// Result is either a session for an existing user, an onboarding token
// for a new user who must complete registration, or a TOTP challenge
// if the existing user has TOTP enabled.
message VerifyEmailCodeResponse {
  oneof result {
    ExistingUserSession existing_user = 1;
    OnboardingSession new_user = 2;
    TotpRequired totp_required = 3;
  }
}

// Session for an existing user whose email was verified.
message ExistingUserSession {
  UserSlug user = 1;
  TokenPair session = 2;
}

// Onboarding token for a new user who must complete registration.
message OnboardingSession {
  string onboarding_token = 1;    // Opaque token, single-use, 12hr TTL
}

// Complete registration for a new user after email verification.
message CompleteRegistrationRequest {
  string onboarding_token = 1;    // From VerifyEmailCodeResponse
  string email = 2;               // Same email used in verification
  Region region = 3;              // Same region used in verification
  string name = 4;                // User display name (PII, regional)
  string organization_name = 5;   // Organization name (PII, regional)
}

// Response after successful registration.
message CompleteRegistrationResponse {
  User user = 1;
  TokenPair session = 2;          // Reuses existing TokenPair message
  OrganizationSlug organization = 3;  // The auto-created organization
}

// -----------------------------------------------------------------------------
// User Credential Messages
// -----------------------------------------------------------------------------

// Credential type discriminator.
enum CredentialType {
  CREDENTIAL_TYPE_UNSPECIFIED = 0;
  CREDENTIAL_TYPE_PASSKEY = 1;
  CREDENTIAL_TYPE_TOTP = 2;
  CREDENTIAL_TYPE_RECOVERY_CODE = 3;
}

// TOTP hash algorithm (RFC 6238).
enum TotpAlgorithm {
  TOTP_ALGORITHM_SHA1 = 0;     // Default, widest authenticator compatibility
  TOTP_ALGORITHM_SHA256 = 1;
  TOTP_ALGORITHM_SHA512 = 2;
}

// A user authentication credential (passkey, TOTP, or recovery codes).
message UserCredential {
  int64 id = 1;                               // UserCredentialId
  UserSlug user = 2;
  CredentialType credential_type = 3;
  string name = 4;
  bool enabled = 5;
  google.protobuf.Timestamp created_at = 6;
  optional google.protobuf.Timestamp last_used_at = 7;
  oneof data {
    PasskeyCredentialData passkey = 10;
    TotpCredentialData totp = 11;
    RecoveryCodeCredentialData recovery_code = 12;
  }
}

// WebAuthn passkey credential data.
message PasskeyCredentialData {
  bytes credential_id = 1;                    // WebAuthn credential ID
  bytes public_key = 2;                       // COSE-encoded public key
  uint32 sign_count = 3;                      // Replay protection counter
  repeated string transports = 4;             // "internal", "usb", "ble", "nfc"
  bool backup_eligible = 5;
  bool backup_state = 6;
  optional string attestation_format = 7;
  optional bytes aaguid = 8;                  // 16-byte authenticator model ID
}

// TOTP credential data (RFC 6238).
// The secret field is stripped from gRPC responses by the handler layer.
message TotpCredentialData {
  bytes secret = 1;                           // 20-byte HMAC secret
  TotpAlgorithm algorithm = 2;
  uint32 digits = 3;                          // Standard: 6
  uint32 period = 4;                          // Standard: 30 seconds
}

// Recovery code credential data.
message RecoveryCodeCredentialData {
  repeated bytes code_hashes = 1;             // SHA-256 hashes of unused codes
  uint32 total_generated = 2;                 // Original count (e.g., 10)
}

// Audit trail metadata for primary authentication method.
message CredentialInfo {
  string credential_type = 1;                 // "passkey", "email_code", "recovery_code"
  optional int64 credential_id = 2;           // UserCredentialId, if credential-based
}

// Returned when a TOTP-enabled user must complete second-factor verification.
message TotpRequired {
  bytes challenge_nonce = 1;                  // 32-byte one-time challenge nonce
}

// ── Credential CRUD ──

message CreateUserCredentialRequest {
  UserSlug user = 1;
  CredentialType credential_type = 2;
  string name = 3;
  // Identity of the user performing this operation.
  UserSlug caller = 4;
  oneof data {
    PasskeyCredentialData passkey = 10;
    TotpCredentialData totp = 11;
    RecoveryCodeCredentialData recovery_code = 12;
  }
}

message CreateUserCredentialResponse {
  UserCredential credential = 1;
}

message ListUserCredentialsRequest {
  UserSlug user = 1;
  optional CredentialType credential_type = 2;
  // Identity of the user performing this operation.
  UserSlug caller = 3;
}

message ListUserCredentialsResponse {
  repeated UserCredential credentials = 1;    // TOTP secrets stripped
}

message UpdateUserCredentialRequest {
  UserSlug user = 1;
  int64 credential_id = 2;
  optional string name = 3;
  optional bool enabled = 4;
  // Identity of the user performing this operation.
  UserSlug caller = 5;
  // Only passkey updates are allowed (sign_count, backup_state).
  // TOTP and recovery code credentials are immutable after creation.
  optional PasskeyCredentialData passkey = 10;
}

message UpdateUserCredentialResponse {
  UserCredential credential = 1;
}

message DeleteUserCredentialRequest {
  UserSlug user = 1;
  int64 credential_id = 2;
  // Identity of the user performing this operation.
  UserSlug caller = 3;
}

message DeleteUserCredentialResponse {}

// ── TOTP Challenge / Verification ──

message CreateTotpChallengeRequest {
  UserSlug user = 1;
  string primary_method = 2;                  // "passkey" — audit trail
  // Identity of the user performing this operation.
  UserSlug caller = 3;
}

message CreateTotpChallengeResponse {
  bytes challenge_nonce = 1;                  // 32-byte one-time nonce
}

message VerifyTotpRequest {
  UserSlug user = 1;
  string totp_code = 2;                       // 6-digit TOTP code
  bytes challenge_nonce = 3;                  // Nonce from CreateTotpChallenge or VerifyEmailCode
  optional CredentialInfo credential_used = 4; // Audit trail for created session
  // Identity of the user performing this operation.
  UserSlug caller = 5;
}

message VerifyTotpResponse {
  TokenPair tokens = 1;                       // Session created directly
}

// ── Recovery Code ──

message ConsumeRecoveryCodeRequest {
  UserSlug user = 1;
  string code = 2;                            // 8-char alphanumeric recovery code
  bytes challenge_nonce = 3;                  // Nonce from the TOTP challenge
  optional CredentialInfo credential_used = 4; // Audit trail for created session
  // Identity of the user performing this operation.
  UserSlug caller = 5;
}

message ConsumeRecoveryCodeResponse {
  TokenPair tokens = 1;                       // Session created directly
  uint32 remaining_codes = 2;                 // Remaining unused recovery codes
}

// -----------------------------------------------------------------------------
// Runtime Configuration Messages
// -----------------------------------------------------------------------------

// Update runtime-reconfigurable configuration parameters.
// Only fields that are set will be updated; unset fields retain current values.
// Set dry_run=true to validate without applying.
message UpdateConfigRequest {
  // JSON-encoded RuntimeConfig (only reconfigurable fields).
  // Reconfigurable subset: rate_limit, hot_key, compaction, validation.
  string config_json = 1;
  // If true, validate the config without applying changes.
  bool dry_run = 2;
}

message UpdateConfigResponse {
  // Whether the update was applied (false for dry_run or validation failure).
  bool applied = 1;
  // Human-readable summary: fields changed, or validation error details.
  string message = 2;
  // JSON-encoded current RuntimeConfig after the update (or before, for dry_run).
  string current_config_json = 3;
  // List of field paths that were changed (e.g., ["rate_limit", "hot_key"]).
  repeated string changed_fields = 4;
}

// Get current runtime configuration.
message GetConfigRequest {}

message GetConfigResponse {
  // JSON-encoded current RuntimeConfig.
  string config_json = 1;
}

// -----------------------------------------------------------------------------
// Backup & Restore Messages
// -----------------------------------------------------------------------------

// Backup type indicator.
enum BackupType {
  // Unspecified backup type.
  BACKUP_TYPE_UNSPECIFIED = 0;
  // Full backup containing all database pages.
  BACKUP_TYPE_FULL = 1;
  // Incremental backup containing only pages changed since the base backup.
  BACKUP_TYPE_INCREMENTAL = 2;
}

// Create a consistent backup of region state.
message CreateBackupRequest {
  // Optional tag for identifying this backup (e.g., "pre-migration").
  optional string tag = 1;
  // For incremental backup: ID of the base (full) backup.
  // When provided, only pages changed since the base are included.
  // Omit for a full backup.
  optional string base_backup_id = 2;
}

message CreateBackupResponse {
  // Unique backup identifier (timestamp-based).
  string backup_id = 1;
  // Region height at backup time.
  uint64 region_height = 2;
  // Path where the backup was written.
  string backup_path = 3;
  // Size of the backup in bytes.
  uint64 size_bytes = 4;
  // SHA-256 checksum of the backup file.
  Hash checksum = 5;
}

// List available backups.
message ListBackupsRequest {
  // Maximum number of backups to return (0 = all).
  uint32 limit = 1;
}

message ListBackupsResponse {
  repeated BackupInfo backups = 1;
}

// Metadata about an available backup.
message BackupInfo {
  // Unique backup identifier.
  string backup_id = 1;
  // Region height at backup time.
  uint64 region_height = 2;
  // Path where the backup is stored.
  string backup_path = 3;
  // Size in bytes.
  uint64 size_bytes = 4;
  // When the backup was created.
  google.protobuf.Timestamp created_at = 5;
  // SHA-256 checksum for integrity verification.
  Hash checksum = 6;
  // Chain commitment at backup time (for integrity verification at restore).
  Hash chain_commitment_hash = 7;
  // Snapshot format version.
  uint32 schema_version = 8;
  // Optional user-provided tag.
  string tag = 9;
  // Backup type (full or incremental).
  BackupType backup_type = 10;
  // For incremental backups, the ID of the base (full) backup.
  optional string base_backup_id = 11;
  // Number of pages in this backup.
  optional uint64 page_count = 12;
}

// Restore state from a backup. Requires explicit confirmation.
message RestoreBackupRequest {
  // Backup identifier to restore from.
  string backup_id = 1;
  // Must be true to proceed. Safety gate to prevent accidental restores.
  bool confirm = 2;
}

message RestoreBackupResponse {
  // Whether the restore succeeded.
  bool success = 1;
  // Human-readable result message.
  string message = 2;
  // Region height after restore.
  uint64 restored_height = 3;
}

// -----------------------------------------------------------------------------
// Cluster Membership Messages
// -----------------------------------------------------------------------------

// Request to join an existing cluster.
// The node provides its ID and address so the leader can add it to Raft.
message JoinClusterRequest {
  uint64 node_id = 1; // Numeric node ID for Raft
  string address = 2; // gRPC address (e.g., "10.0.0.5:50051")
}

message JoinClusterResponse {
  bool success = 1;
  string message = 2; // Error details if !success
  uint64 leader_id = 3; // Current leader (for redirect if needed)
  string leader_address = 4; // Leader's gRPC address
}

// Request to gracefully leave the cluster.
message LeaveClusterRequest {
  uint64 node_id = 1; // Node requesting to leave
}

message LeaveClusterResponse {
  bool success = 1;
  string message = 2;
}

message GetDecommissionStatusRequest {
  uint64 node_id = 1;
}

message DataRegionReplica {
  string region = 1;
  string role = 2;
}

message GetDecommissionStatusResponse {
  string status = 1;
  repeated DataRegionReplica remaining = 2;
  bool global_removed = 3;
}

message CheckPeerLivenessRequest {
  uint64 target_node_id = 1;
}

message CheckPeerLivenessResponse {
  bool reachable = 1;
  uint64 last_seen_ago_ms = 2;
}

// Get current cluster membership.
message GetClusterInfoRequest {}

message GetClusterInfoResponse {
  repeated ClusterMember members = 1;
  uint64 leader_id = 2;
  uint64 term = 3; // Current Raft term
}

// Request for node identity (empty - no parameters needed).
message GetNodeInfoRequest {}

// Node identity for bootstrap coordination.
// Available before cluster formation to support coordinated bootstrap.
message GetNodeInfoResponse {
  // Node's Snowflake ID (auto-generated, persisted).
  uint64 node_id = 1;
  // Node's gRPC address (e.g., "192.168.1.10:50051").
  string address = 2;
  // True if node is already part of a cluster.
  bool is_cluster_member = 3;
  // Current Raft term (0 if not in cluster).
  uint64 term = 4;
  // Cluster ID (0 if uninitialized).
  uint64 cluster_id = 5;
  // Node lifecycle state: "uninitialized" or "running".
  string state = 6;
}

// Request to initialize a new cluster (empty - no parameters needed).
message InitClusterRequest {}

// Response from cluster initialization.
message InitClusterResponse {
  // True if this call performed the initialization.
  bool initialized = 1;
  // The cluster's unique identifier.
  uint64 cluster_id = 2;
  // True if the cluster was already initialized (idempotent case).
  bool already_initialized = 3;
}

// A member of the Raft cluster.
message ClusterMember {
  uint64 node_id = 1;
  string address = 2;
  ClusterMemberRole role = 3;
  bool is_leader = 4;
}

enum ClusterMemberRole {
  CLUSTER_MEMBER_ROLE_UNSPECIFIED = 0;
  CLUSTER_MEMBER_ROLE_VOTER = 1; // Full voting member
  CLUSTER_MEMBER_ROLE_LEARNER = 2; // Receiving logs but can't vote
}

// =============================================================================
// User Service
// =============================================================================

// User lifecycle, email management, region migration, and GDPR erasure.
service UserService {
  // Create a new user with a primary email address.
  // Atomically creates the user record and their primary UserEmail.
  // A UserSlug (Snowflake ID) is generated and returned.
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);

  // Get user info by slug.
  rpc GetUser(GetUserRequest) returns (GetUserResponse);

  // Partial update of user fields (name, role, primary email).
  // Only provided optional fields are modified.
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);

  // Soft-delete a user. Sets status to DELETING with a regional retention
  // period (default 90 days). After retention expires, EraseUser triggers
  // automatically followed by hard deletion.
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);

  // List all users (paginated).
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  // Search users by filter (email, status, role). Extensible filter design.
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);

  // Add an email address to an existing user.
  rpc CreateUserEmail(CreateUserEmailRequest) returns (CreateUserEmailResponse);

  // Remove a non-primary email address from a user.
  rpc DeleteUserEmail(DeleteUserEmailRequest) returns (DeleteUserEmailResponse);

  // Search email records by filter.
  rpc SearchUserEmail(SearchUserEmailRequest) returns (SearchUserEmailResponse);

  // Mark an email as verified using a verification token.
  rpc VerifyUserEmail(VerifyUserEmailRequest) returns (VerifyUserEmailResponse);

  // Migrate a user's PII from one regional store to another.
  // Updates the GLOBAL directory entry and moves data via saga.
  // Authenticated API calls are rejected during migration.
  rpc MigrateUserRegion(MigrateUserRegionRequest) returns (MigrateUserRegionResponse);

  // Erase a user's PII via crypto-shredding (GDPR Article 17).
  // Destroys the per-subject encryption key, scrubs directory entry,
  // removes email hash indexes, and creates erasure audit record.
  // Each step is idempotent — safe to retry on failure.
  rpc EraseUser(EraseUserRequest) returns (EraseUserResponse);

  // Initiate email verification for onboarding. Sends a 6-character
  // verification code to the provided email address. Rate-limited per email.
  rpc InitiateEmailVerification(InitiateEmailVerificationRequest)
      returns (InitiateEmailVerificationResponse);

  // Verify an email code. Returns either an existing user session (if the
  // email belongs to a registered user) or an onboarding token (for new users).
  rpc VerifyEmailCode(VerifyEmailCodeRequest)
      returns (VerifyEmailCodeResponse);

  // Complete registration for a new user. Creates the user, organization,
  // and returns a session. Requires a valid onboarding token from VerifyEmailCode.
  rpc CompleteRegistration(CompleteRegistrationRequest)
      returns (CompleteRegistrationResponse);

  // ── Credential Management ──

  // Create a new credential (passkey, TOTP, or recovery codes) for a user.
  // Enforces: one TOTP per user, one recovery code set per user, passkey ID uniqueness.
  rpc CreateUserCredential(CreateUserCredentialRequest)
      returns (CreateUserCredentialResponse);

  // List credentials for a user, optionally filtered by type.
  // TOTP secrets are stripped from responses.
  rpc ListUserCredentials(ListUserCredentialsRequest)
      returns (ListUserCredentialsResponse);

  // Update credential metadata (name, enabled) or passkey-specific fields.
  // TOTP and recovery code credentials are immutable after creation.
  rpc UpdateUserCredential(UpdateUserCredentialRequest)
      returns (UpdateUserCredentialResponse);

  // Delete a credential. Rejects if it's the user's last credential.
  rpc DeleteUserCredential(DeleteUserCredentialRequest)
      returns (DeleteUserCredentialResponse);

  // ── TOTP Verification ──

  // Create a TOTP challenge after passkey authentication.
  // Called by trusted services (e.g., Control) that verified passkey auth.
  rpc CreateTotpChallenge(CreateTotpChallengeRequest)
      returns (CreateTotpChallengeResponse);

  // Verify a TOTP code against a pending challenge.
  // On success, atomically consumes the challenge and creates a session.
  rpc VerifyTotp(VerifyTotpRequest) returns (VerifyTotpResponse);

  // ── Recovery Code ──

  // Consume a recovery code to bypass TOTP verification.
  // Atomically removes the code hash and creates a session.
  rpc ConsumeRecoveryCode(ConsumeRecoveryCodeRequest)
      returns (ConsumeRecoveryCodeResponse);
}

// =============================================================================
// Invitation Service
// =============================================================================

// External Snowflake identifier for an organization invitation.
// Internal sequential InviteId(i64) is used for storage but never appears in the API.
message InviteSlug {
  uint64 slug = 1;
}

// Lifecycle state of an organization invitation.
// All transitions originate from PENDING. Terminal states are immutable.
enum InvitationStatus {
  INVITATION_STATUS_UNSPECIFIED = 0;
  INVITATION_STATUS_PENDING = 1;
  INVITATION_STATUS_ACCEPTED = 2;
  INVITATION_STATUS_DECLINED = 3;
  INVITATION_STATUS_EXPIRED = 4;
  INVITATION_STATUS_REVOKED = 5;
}

// Shared invitation view. Field population varies by caller role:
// - Admin callers: invitee_email populated, organization_name empty.
// - User callers: invitee_email omitted, organization_name populated.
message Invitation {
  InviteSlug slug = 1;
  OrganizationSlug organization = 2;
  UserSlug inviter = 3;
  string invitee_email = 4;                   // Admin reads only
  string organization_name = 5;              // User reads only
  OrganizationMemberRole role = 6;
  optional TeamSlug team = 7;
  InvitationStatus status = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp expires_at = 10;
  optional google.protobuf.Timestamp resolved_at = 11;
}

// Organization invitation lifecycle management.
// Admin operations require org admin authorization.
// User operations require authenticated user with matching email HMAC.
service InvitationService {
  // Create an invitation for an email address to join an organization.
  // Returns the raw token once (for Control to embed in the email URL).
  rpc CreateOrganizationInvite(CreateOrganizationInviteRequest)
      returns (CreateOrganizationInviteResponse);

  // List invitations created by an organization (admin view).
  rpc ListOrganizationInvites(ListOrganizationInvitesRequest)
      returns (ListOrganizationInvitesResponse);

  // Get a single invitation by slug (admin view).
  rpc GetOrganizationInvite(GetOrganizationInviteRequest)
      returns (GetOrganizationInviteResponse);

  // Revoke a pending invitation. CAS-guarded (Pending-only).
  rpc RevokeOrganizationInvite(RevokeOrganizationInviteRequest)
      returns (RevokeOrganizationInviteResponse);

  // List invitations received by the authenticated user.
  // Scans all verified email HMACs and unions results.
  rpc ListReceivedInvitations(ListReceivedInvitationsRequest)
      returns (ListReceivedInvitationsResponse);

  // Get invitation details for the authenticated user.
  // Returns NOT_FOUND for both non-existent and unauthorized slugs.
  rpc GetInvitationDetails(GetInvitationDetailsRequest)
      returns (GetInvitationDetailsResponse);

  // Accept a pending invitation. Grants org membership and optional team membership.
  // GLOBAL-first proposal ordering. Partial failure recovery on retry.
  rpc AcceptInvitation(AcceptInvitationRequest)
      returns (AcceptInvitationResponse);

  // Decline a pending invitation. CAS-guarded (Pending-only).
  rpc DeclineInvitation(DeclineInvitationRequest)
      returns (DeclineInvitationResponse);
}

// -----------------------------------------------------------------------------
// Invitation Messages
// -----------------------------------------------------------------------------

message CreateOrganizationInviteRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;                        // Must be org admin
  string email = 3;                           // Invitee email address
  OrganizationMemberRole role = 4;            // Role upon acceptance
  uint32 ttl_hours = 5;                       // 1–720
  optional TeamSlug team = 6;                // Auto-join team on acceptance
}

message CreateOrganizationInviteResponse {
  InviteSlug slug = 1;
  InvitationStatus status = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp expires_at = 4;
  string token = 5;                           // Raw token — returned ONLY on creation
}

message ListOrganizationInvitesRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;                        // Must be org admin
  optional InvitationStatus status_filter = 3;
  optional bytes page_token = 4;
  uint32 page_size = 5;
}

message ListOrganizationInvitesResponse {
  repeated Invitation invitations = 1;
  optional bytes next_page_token = 2;
}

message GetOrganizationInviteRequest {
  InviteSlug slug = 1;
  UserSlug caller = 2;                        // Must be org admin
}

message GetOrganizationInviteResponse {
  Invitation invitation = 1;
}

message RevokeOrganizationInviteRequest {
  InviteSlug slug = 1;
  UserSlug caller = 2;                        // Must be org admin
}

message RevokeOrganizationInviteResponse {
  Invitation invitation = 1;
}

message ListReceivedInvitationsRequest {
  UserSlug user = 1;                          // Authenticated user
  optional InvitationStatus status_filter = 2;
  optional bytes page_token = 3;
  uint32 page_size = 4;
  // Identity of the user performing this operation.
  UserSlug caller = 5;
}

message ListReceivedInvitationsResponse {
  repeated Invitation invitations = 1;
  optional bytes next_page_token = 2;
}

message GetInvitationDetailsRequest {
  InviteSlug slug = 1;
  UserSlug user = 2;                          // Must match invitee email
  // Identity of the user performing this operation.
  UserSlug caller = 3;
}

message GetInvitationDetailsResponse {
  Invitation invitation = 1;
}

message AcceptInvitationRequest {
  InviteSlug slug = 1;
  UserSlug caller = 2;                      // Identity of the user performing this operation.
}

message AcceptInvitationResponse {
  Invitation invitation = 1;
}

message DeclineInvitationRequest {
  InviteSlug slug = 1;
  UserSlug caller = 2;                          // Identity of the user performing this operation.
}

message DeclineInvitationResponse {
  Invitation invitation = 1;
}

// =============================================================================
// App Service
// =============================================================================

// Organization-scoped client application management.
// All mutations require Organization Administrator authorization.
service AppService {
  // Create a new app within an organization.
  rpc CreateApp(CreateAppRequest) returns (CreateAppResponse);

  // Get an app by slug.
  rpc GetApp(GetAppRequest) returns (GetAppResponse);

  // List all apps in an organization.
  rpc ListApps(ListAppsRequest) returns (ListAppsResponse);

  // Update app metadata (name, description).
  rpc UpdateApp(UpdateAppRequest) returns (UpdateAppResponse);

  // Delete an app and all associated credentials and vault connections.
  rpc DeleteApp(DeleteAppRequest) returns (DeleteAppResponse);

  // Enable or disable an app.
  rpc SetAppEnabled(SetAppEnabledRequest) returns (SetAppEnabledResponse);

  // Enable or disable a credential type on an app.
  rpc SetAppCredentialEnabled(SetAppCredentialEnabledRequest) returns (SetAppCredentialEnabledResponse);

  // Get the client secret credential (hash only, not the plaintext secret).
  rpc GetAppClientSecret(GetAppClientSecretRequest) returns (GetAppClientSecretResponse);

  // Rotate the client secret. Returns the new plaintext secret (one-time).
  rpc RotateAppClientSecret(RotateAppClientSecretRequest) returns (RotateAppClientSecretResponse);

  // List client assertion entries for an app.
  rpc ListAppClientAssertions(ListAppClientAssertionsRequest) returns (ListAppClientAssertionsResponse);

  // Create a client assertion entry. Returns the private key PEM (one-time).
  rpc CreateAppClientAssertion(CreateAppClientAssertionRequest) returns (CreateAppClientAssertionResponse);

  // Delete a client assertion entry.
  rpc DeleteAppClientAssertion(DeleteAppClientAssertionRequest) returns (DeleteAppClientAssertionResponse);

  // Enable or disable a client assertion entry.
  rpc SetAppClientAssertionEnabled(SetAppClientAssertionEnabledRequest) returns (SetAppClientAssertionEnabledResponse);

  // List vault connections for an app.
  rpc ListAppVaults(ListAppVaultsRequest) returns (ListAppVaultsResponse);

  // Add a vault connection to an app.
  rpc AddAppVault(AddAppVaultRequest) returns (AddAppVaultResponse);

  // Update a vault connection's allowed scopes.
  rpc UpdateAppVault(UpdateAppVaultRequest) returns (UpdateAppVaultResponse);

  // Remove a vault connection from an app.
  rpc RemoveAppVault(RemoveAppVaultRequest) returns (RemoveAppVaultResponse);
}

// Credential type discriminator for enable/disable operations.
enum AppCredentialType {
  APP_CREDENTIAL_TYPE_UNSPECIFIED = 0;
  APP_CREDENTIAL_TYPE_CLIENT_SECRET = 1;
  APP_CREDENTIAL_TYPE_MTLS_CA = 2;
  APP_CREDENTIAL_TYPE_MTLS_SELF_SIGNED = 3;
  APP_CREDENTIAL_TYPE_CLIENT_ASSERTION = 4;
}

// App resource as returned by Get/List.
// Credentials are included in Get but omitted from List for efficiency.
message AppInfo {
  AppSlug slug = 1;
  string name = 2;
  optional string description = 3;
  bool enabled = 4;
  optional AppCredentialsInfo credentials = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

// Credential configuration state (enabled flags only, no secrets).
message AppCredentialsInfo {
  bool client_secret_enabled = 1;
  bool mtls_ca_enabled = 2;
  bool mtls_self_signed_enabled = 3;
  bool client_assertion_enabled = 4;
}

// Client assertion entry metadata (public info only).
message AppClientAssertionInfo {
  ClientAssertionId id = 1;
  string name = 2;
  bool enabled = 3;
  google.protobuf.Timestamp expires_at = 4;
  google.protobuf.Timestamp created_at = 5;
}

// Vault connection info.
message AppVaultConnectionInfo {
  VaultSlug vault = 1;
  repeated string allowed_scopes = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message CreateAppRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
  string name = 3;
  optional string description = 4;
}

message CreateAppResponse {
  AppInfo app = 1;
}

message GetAppRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
  AppSlug app = 3;
}

message GetAppResponse {
  AppInfo app = 1;
}

message ListAppsRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
}

message ListAppsResponse {
  repeated AppInfo apps = 1;
}

message UpdateAppRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
  AppSlug app = 3;
  optional string name = 4;
  optional string description = 5;
}

message UpdateAppResponse {
  AppInfo app = 1;
}

message DeleteAppRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
  AppSlug app = 3;
}

message DeleteAppResponse {}

message SetAppEnabledRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
  AppSlug app = 3;
  bool enabled = 4;
}

message SetAppEnabledResponse {
  AppInfo app = 1;
}

message SetAppCredentialEnabledRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
  AppSlug app = 3;
  AppCredentialType credential_type = 4;
  bool enabled = 5;
}

message SetAppCredentialEnabledResponse {
  AppInfo app = 1;
}

message GetAppClientSecretRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
  AppSlug app = 3;
}

message GetAppClientSecretResponse {
  bool enabled = 1;
  bool has_secret = 2;
}

message RotateAppClientSecretRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
  AppSlug app = 3;
  // Client-generated UUID (16 bytes) for idempotent retry.
  // If a previous request with the same key already committed, the cached
  // response is returned instead of generating a new secret.
  bytes idempotency_key = 4;
}

message RotateAppClientSecretResponse {
  // Base64-encoded plaintext secret. Only returned here — never again.
  string secret = 1;
}

message ListAppClientAssertionsRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
  AppSlug app = 3;
}

message ListAppClientAssertionsResponse {
  repeated AppClientAssertionInfo assertions = 1;
}

message CreateAppClientAssertionRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
  AppSlug app = 3;
  string name = 4;
  google.protobuf.Timestamp expires_at = 5;
  // Client-generated UUID (16 bytes) for idempotent retry.
  // If a previous request with the same key already committed, the cached
  // response (including the private key PEM) is returned instead of generating
  // a new keypair.
  bytes idempotency_key = 6;
}

message CreateAppClientAssertionResponse {
  AppClientAssertionInfo assertion = 1;
  // PEM-encoded private key. Only returned here — never again.
  string private_key_pem = 2;
}

message DeleteAppClientAssertionRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
  AppSlug app = 3;
  ClientAssertionId assertion = 4;
}

message DeleteAppClientAssertionResponse {}

message SetAppClientAssertionEnabledRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
  AppSlug app = 3;
  ClientAssertionId assertion = 4;
  bool enabled = 5;
}

message SetAppClientAssertionEnabledResponse {}

message ListAppVaultsRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
  AppSlug app = 3;
}

message ListAppVaultsResponse {
  repeated AppVaultConnectionInfo vaults = 1;
}

message AddAppVaultRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
  AppSlug app = 3;
  VaultSlug vault = 4;
  repeated string allowed_scopes = 5;
}

message AddAppVaultResponse {
  AppVaultConnectionInfo vault = 1;
}

message UpdateAppVaultRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
  AppSlug app = 3;
  VaultSlug vault = 4;
  repeated string allowed_scopes = 5;
}

message UpdateAppVaultResponse {
  AppVaultConnectionInfo vault = 1;
}

message RemoveAppVaultRequest {
  OrganizationSlug organization = 1;
  UserSlug caller = 2;
  AppSlug app = 3;
  VaultSlug vault = 4;
}

message RemoveAppVaultResponse {}

// =============================================================================
// Token Service
// =============================================================================

// JWT token lifecycle: session creation, vault token issuance, refresh,
// revocation, and signing key management.
service TokenService {
  // Create a user session token pair (access + refresh).
  rpc CreateUserSession(CreateUserSessionRequest) returns (CreateUserSessionResponse);

  // Validate an access token and return parsed claims.
  // Returns UNAUTHENTICATED for expired/invalid tokens.
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);

  // Create a vault access token pair for an app.
  rpc CreateVaultToken(CreateVaultTokenRequest) returns (CreateVaultTokenResponse);

  // Refresh an access token using a refresh token.
  // Implements rotation: old refresh token is consumed, new pair issued.
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);

  // Revoke a refresh token and its entire token family.
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse);

  // Revoke all sessions for a user (increments token version).
  rpc RevokeAllUserSessions(RevokeAllUserSessionsRequest) returns (RevokeAllUserSessionsResponse);

  // Revoke all sessions for an app (increments app token version).
  rpc RevokeAllAppSessions(RevokeAllAppSessionsRequest) returns (RevokeAllAppSessionsResponse);

  // Create a new signing key for the given scope.
  rpc CreateSigningKey(CreateSigningKeyRequest) returns (CreateSigningKeyResponse);

  // Rotate a signing key: creates a replacement and marks the old key as rotated.
  rpc RotateSigningKey(RotateSigningKeyRequest) returns (RotateSigningKeyResponse);

  // Revoke a signing key immediately (no grace period).
  rpc RevokeSigningKey(RevokeSigningKeyRequest) returns (RevokeSigningKeyResponse);

  // Get active public keys for token verification (JWKS-style).
  rpc GetPublicKeys(GetPublicKeysRequest) returns (GetPublicKeysResponse);

  // Authenticate a client assertion JWT and return a vault access token.
  // Ledger verifies the JWT signature against the app's registered client
  // assertion public keys, validates claims (iss, sub, exp, aud), and issues
  // a scoped vault token if the app is authorized.
  rpc AuthenticateClientAssertion(AuthenticateClientAssertionRequest) returns (AuthenticateClientAssertionResponse);
}

// Scope discriminator for signing keys.
enum SigningKeyScope {
  SIGNING_KEY_SCOPE_UNSPECIFIED = 0;
  SIGNING_KEY_SCOPE_GLOBAL = 1;
  SIGNING_KEY_SCOPE_ORGANIZATION = 2;
}

// ── Token Types ──

message TokenPair {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp access_expires_at = 3;
  google.protobuf.Timestamp refresh_expires_at = 4;
}

// ── User Session RPCs ──

message CreateUserSessionRequest {
  UserSlug user = 1;
  // Audit trail: which credential was used for primary authentication.
  // Required for passkey logins; omitted for email-code (implicit).
  optional CredentialInfo credential_used = 2;
  // Identity of the user performing this operation.
  UserSlug caller = 3;
}

message CreateUserSessionResponse {
  TokenPair tokens = 1;
}

// ── Token Validation ──

// Validate an access token and return parsed claims on success.
// On validation failure, returns a gRPC error (UNAUTHENTICATED/PERMISSION_DENIED)
// with the failure reason in the status message — not a valid=false response.
message ValidateTokenRequest {
  string token = 1;
  string expected_audience = 2;
}

message ValidateTokenResponse {
  string subject = 1;
  string token_type = 2;                 // "user_session" | "vault_access"
  google.protobuf.Timestamp expires_at = 3;
  // Type-specific claims. oneof enforces valid combinations at the proto level.
  oneof claims {
    UserSessionClaims user_session = 4;
    VaultAccessClaims vault_access = 5;
  }
}

message UserSessionClaims {
  uint64 user_slug = 1;
  string role = 2;                       // "user" | "admin"
}

message VaultAccessClaims {
  uint64 org_slug = 1;
  uint64 app_slug = 2;
  uint64 vault_slug = 3;
  repeated string scopes = 4;
}

// ── Vault Token RPCs ──

message CreateVaultTokenRequest {
  OrganizationSlug organization = 1;
  AppSlug app = 2;
  VaultSlug vault = 3;
  repeated string scopes = 4;
}

message CreateVaultTokenResponse {
  TokenPair tokens = 1;
}

// ── Client Assertion Authentication ──

message AuthenticateClientAssertionRequest {
  OrganizationSlug organization = 1;
  VaultSlug vault = 2;
  string assertion_jwt = 3;
  repeated string scopes = 4;
}

message AuthenticateClientAssertionResponse {
  TokenPair tokens = 1;
}

// ── Unified Refresh/Revoke RPCs ──

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  TokenPair tokens = 1;
}

message RevokeTokenRequest {
  string refresh_token = 1;
}

message RevokeTokenResponse {}

message RevokeAllUserSessionsRequest {
  UserSlug user = 1;
  // Identity of the user performing this operation.
  UserSlug caller = 2;
}

message RevokeAllUserSessionsResponse {
  uint64 revoked_count = 1;
}

message RevokeAllAppSessionsRequest {
  OrganizationSlug organization = 1;
  AppSlug app = 2;
}

message RevokeAllAppSessionsResponse {
  uint64 revoked_count = 1;
}

// ── Signing Key Management RPCs ──

message CreateSigningKeyRequest {
  SigningKeyScope scope = 1;
  optional OrganizationSlug organization = 2;  // Required when scope=SIGNING_KEY_SCOPE_ORGANIZATION
  // Identity of the user performing this operation.
  UserSlug caller = 3;
}

message CreateSigningKeyResponse {
  PublicKeyInfo key = 1;
}

message RotateSigningKeyRequest {
  string kid = 1;
  uint64 grace_period_secs = 2;          // 0 = use default from JwtConfig
  bool force_revoke = 3;                 // true = immediately revoke old key (skip grace period)
  // Identity of the user performing this operation.
  UserSlug caller = 4;
}

message RotateSigningKeyResponse {
  PublicKeyInfo new_key = 1;
}

message RevokeSigningKeyRequest {
  string kid = 1;
  // Identity of the user performing this operation.
  UserSlug caller = 2;
}

message RevokeSigningKeyResponse {}

message GetPublicKeysRequest {
  optional OrganizationSlug organization = 1;  // Absent = global keys
  // Identity of the user performing this operation.
  UserSlug caller = 2;
}

message GetPublicKeysResponse {
  repeated PublicKeyInfo keys = 1;
}

message PublicKeyInfo {
  string kid = 1;
  bytes public_key = 2;                  // 32-byte Ed25519 public key
  string status = 3;                     // "active" | "rotated" | "revoked"
  google.protobuf.Timestamp valid_from = 4;
  google.protobuf.Timestamp valid_until = 5; // Null if active
  google.protobuf.Timestamp created_at = 6;
}

// =============================================================================
// Events Service
// =============================================================================

// Unified audit event query and ingestion API.
//
// Events come from three sources:
// - Ledger apply-phase (deterministic, Raft-replicated): committed writes, vault/org lifecycle
// - Ledger handler-phase (node-local): denials, admin operations
// - External services (Engine/Control via IngestEvents): authorization decisions, management ops
//
// All events share the same EventEntry format and live in the same Events table.
// System events are accessible via SYSTEM_ORGANIZATION_SLUG (slug = 0).
service EventsService {
  // List events for an organization with filtering and pagination.
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);

  // Get a single event by ID.
  rpc GetEvent(GetEventRequest) returns (GetEventResponse);

  // Count events matching a filter.
  rpc CountEvents(CountEventsRequest) returns (CountEventsResponse);

  // Ingest events from external services (Engine, Control).
  // Uses handler-phase semantics (node-local, no Raft).
  rpc IngestEvents(IngestEventsRequest) returns (IngestEventsResponse);
}

// Scope of an audit event.
enum EventScope {
  EVENT_SCOPE_UNSPECIFIED = 0;
  // Cluster-wide administrative events (org_id = 0).
  EVENT_SCOPE_SYSTEM = 1;
  // Per-organization tenant events.
  EVENT_SCOPE_ORGANIZATION = 2;
}

// Outcome of an audited operation.
enum EventOutcome {
  EVENT_OUTCOME_UNSPECIFIED = 0;
  // Operation completed successfully.
  EVENT_OUTCOME_SUCCESS = 1;
  // Operation failed with an error.
  EVENT_OUTCOME_FAILED = 2;
  // Operation was denied (rate limited, unauthorized, etc.).
  EVENT_OUTCOME_DENIED = 3;
}

// Emission path indicating the consistency model of an event.
enum EventEmissionPath {
  EMISSION_PATH_UNSPECIFIED = 0;
  // Deterministic, Raft-replicated — identical on all nodes.
  EMISSION_PATH_APPLY_PHASE = 1;
  // Node-local, best-effort — exists only on the handling node.
  // The domain-side representation includes the originating node_id,
  // which is stored as a top-level AuditEvent field rather than in
  // this enum to keep proto enums value-only.
  EMISSION_PATH_HANDLER_PHASE = 2;
}

// Structured audit event record.
//
// Follows the canonical log line ("wide event") pattern — a single structured
// record with rich contextual fields. Queryable via ListEvents.
message EventEntry {
  // Unique event identifier (UUID, 16 bytes).
  bytes event_id = 1;
  // Originating service ("ledger", "engine", or "control").
  string source_service = 2;
  // Hierarchical dot-separated type (e.g., "ledger.vault.created").
  string event_type = 3;
  // Block timestamp (apply-phase) or wall clock (handler-phase).
  google.protobuf.Timestamp timestamp = 4;
  // System or organization scope.
  EventScope scope = 5;
  // What happened (snake_case action name, e.g., "vault_created").
  string action = 6;
  // Consistency model of this event.
  EventEmissionPath emission_path = 7;
  // Who performed the action (server-assigned actor).
  string principal = 8;
  // Owning organization (slug = 0 for system events).
  OrganizationSlug organization = 9;
  // Vault context (when applicable).
  optional VaultSlug vault = 10;
  // Success, failure, or denial.
  EventOutcome outcome = 11;
  // Error code (present when outcome = FAILED).
  optional string error_code = 12;
  // Error description (present when outcome = FAILED).
  optional string error_detail = 13;
  // Denial reason (present when outcome = DENIED).
  optional string denial_reason = 14;
  // Action-specific key-value context.
  map<string, string> details = 15;
  // Reference to blockchain block (for committed writes).
  optional uint64 block_height = 16;
  // Node that generated this event (present for handler-phase events).
  optional uint64 node_id = 17;
  // Distributed tracing correlation (W3C Trace Context).
  optional string trace_id = 18;
  // Business-level correlation for multi-step operations.
  optional string correlation_id = 19;
  // Number of operations (for write actions).
  optional uint32 operations_count = 20;
  // Unix timestamp for TTL expiry (0 = no expiry).
  uint64 expires_at = 21;
}

// Filter criteria for event queries.
message EventFilter {
  // Start of time range (inclusive). Omit for unbounded start.
  optional google.protobuf.Timestamp start_time = 1;
  // End of time range (exclusive). Omit for unbounded end.
  optional google.protobuf.Timestamp end_time = 2;
  // Filter by action names (snake_case). Empty = all actions.
  repeated string actions = 3;
  // Filter by event type prefix (e.g., "ledger.vault" matches "ledger.vault.created").
  // Case-sensitive starts_with matching. Empty = all types.
  optional string event_type_prefix = 4;
  // Filter by principal. Empty = all principals.
  optional string principal = 5;
  // Filter by outcome. UNSPECIFIED = all outcomes.
  EventOutcome outcome = 6;
  // Filter by emission path. UNSPECIFIED = all paths.
  EventEmissionPath emission_path = 7;
  // Filter by business correlation ID.
  optional string correlation_id = 8;
}

// List events for an organization with filtering and pagination.
message ListEventsRequest {
  // Organization to query (slug = 0 for system events).
  OrganizationSlug organization = 1;
  // Optional filter criteria.
  EventFilter filter = 2;
  // Max results per page (0 = default, max 1000).
  uint32 limit = 3;
  // Opaque pagination cursor from previous response.
  string page_token = 4;
  // Identity of the user performing this operation.
  UserSlug caller = 5;
}

message ListEventsResponse {
  // Matching events in chronological order.
  repeated EventEntry entries = 1;
  // Opaque cursor for next page; empty if no more results.
  string next_page_token = 2;
  // Estimated total count (may be approximate for large datasets).
  optional uint64 total_estimate = 3;
}

// Get a single event by ID.
message GetEventRequest {
  // Organization that owns the event.
  OrganizationSlug organization = 1;
  // Event identifier (UUID bytes).
  bytes event_id = 2;
  // Identity of the user performing this operation.
  UserSlug caller = 3;
}

message GetEventResponse {
  // The requested event.
  EventEntry entry = 1;
}

// Count events matching a filter.
message CountEventsRequest {
  // Organization to query (slug = 0 for system events).
  OrganizationSlug organization = 1;
  // Optional filter criteria.
  EventFilter filter = 2;
  // Identity of the user performing this operation.
  UserSlug caller = 3;
}

message CountEventsResponse {
  // Number of matching events.
  uint64 count = 1;
}

// A single event for external ingestion (from Engine or Control).
message IngestEventEntry {
  // Hierarchical dot-separated type (must start with source_service prefix).
  string event_type = 1;
  // Who performed the action.
  string principal = 2;
  // Outcome of the operation.
  EventOutcome outcome = 3;
  // Action-specific key-value context.
  map<string, string> details = 4;
  // Distributed tracing correlation.
  optional string trace_id = 5;
  // Business-level correlation ID.
  optional string correlation_id = 6;
  // Vault context (when applicable).
  optional VaultSlug vault = 7;
  // Event timestamp (defaults to server receive time if omitted).
  optional google.protobuf.Timestamp timestamp = 8;
  // Error code (when outcome = FAILED).
  optional string error_code = 9;
  // Error description (when outcome = FAILED).
  optional string error_detail = 10;
  // Denial reason (when outcome = DENIED).
  optional string denial_reason = 11;
}

// Ingest events from an external service.
message IngestEventsRequest {
  // Source service identifier (validated against allow-list).
  string source_service = 1;
  // Organization that owns these events.
  OrganizationSlug organization = 2;
  // Events to ingest (max batch size enforced by server config).
  repeated IngestEventEntry entries = 3;
  // Identity of the user performing this operation.
  UserSlug caller = 4;
}

// Reason an individual event was rejected during ingestion.
message RejectedEvent {
  // Zero-based index into the request's entries array.
  uint32 index = 1;
  // Human-readable rejection reason.
  string reason = 2;
}

message IngestEventsResponse {
  // Number of events accepted and written.
  uint32 accepted_count = 1;
  // Number of events rejected.
  uint32 rejected_count = 2;
  // Per-event rejection details.
  repeated RejectedEvent rejections = 3;
}

// =============================================================================
// Health Service
// =============================================================================

service HealthService {
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
}

message HealthCheckRequest {
  optional OrganizationSlug organization = 1; // Organization for vault health check
  optional VaultSlug vault = 2; // Omit to check node health
}

message HealthCheckResponse {
  HealthStatus status = 1;
  string message = 2;
  map<string, string> details = 3;
}

enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTH_STATUS_HEALTHY = 1;
  HEALTH_STATUS_DEGRADED = 2;
  HEALTH_STATUS_UNAVAILABLE = 3;
}

// =============================================================================
// System Discovery Service
// =============================================================================

service SystemDiscoveryService {
  // Get known peers (subset of _system state, lightweight)
  rpc GetPeers(GetPeersRequest) returns (GetPeersResponse);

  // Announce a new or updated peer to the cluster
  rpc AnnouncePeer(AnnouncePeerRequest) returns (AnnouncePeerResponse);

  // Get full system state (nodes + organization registry)
  rpc GetSystemState(GetSystemStateRequest) returns (GetSystemStateResponse);

  // Resolve the current leader endpoint for a data residency region.
  // Any node can serve this — reads Raft membership state.
  // Used by SDKs to establish direct connections to regional leaders.
  rpc ResolveRegionLeader(ResolveRegionLeaderRequest) returns (ResolveRegionLeaderResponse);

  // Stream leader updates for a region. Server pushes an initial state
  // immediately, then sends updates whenever the region's Raft leader
  // changes. Stream lifetime is client-controlled; reconnect on disconnect.
  rpc WatchLeader(WatchLeaderRequest) returns (stream LeaderUpdate);
}

message GetPeersRequest {
  uint32 max_peers = 1; // Limit response size (0 = no limit)
}

message GetPeersResponse {
  repeated PeerInfo peers = 1;
  uint64 system_version = 2; // For cache invalidation
}

message PeerInfo {
  NodeId node_id = 1;
  // IP addresses only (no port). IPv4 or IPv6, e.g., ["10.0.0.1", "fd00::1"].
  // Must be private/WireGuard IPs—public IPs rejected.
  // Connect via: addresses[i] + ":" + grpc_port
  repeated string addresses = 2;
  uint32 grpc_port = 3; // gRPC port (same for all addresses), typically 5000
  google.protobuf.Timestamp last_seen = 4;
}

message AnnouncePeerRequest {
  PeerInfo peer = 1;
}

message AnnouncePeerResponse {
  bool accepted = 1;
}

message GetSystemStateRequest {
  uint64 if_version_greater_than = 1; // Return empty if version <= this (cache optimization)
}

message GetSystemStateResponse {
  uint64 version = 1;
  repeated NodeInfo nodes = 2;
  repeated OrganizationRegistry organizations = 3; // Routing table: organization → region
}

// Node physical information. Role (voter/learner) is per-Raft-group, derived
// from openraft membership — not a property of the node itself.
message NodeInfo {
  NodeId node_id = 1;
  // IP addresses only (no port). IPv4 or IPv6, e.g., ["10.0.0.1", "fd00::1"].
  // Must be private/WireGuard IPs—public IPs rejected.
  // Connect via: addresses[i] + ":" + grpc_port
  repeated string addresses = 2;
  uint32 grpc_port = 3; // gRPC port (same for all addresses), typically 5000
  google.protobuf.Timestamp last_heartbeat = 5;
  google.protobuf.Timestamp joined_at = 6; // For voter election ordering
  Region region = 7;    // Geographic region this node belongs to
}

// Routing entry: organization → region assignment
// Note: leader_hint is computed dynamically from Raft state, not stored here
message OrganizationRegistry {
  OrganizationSlug slug = 1;
  string name = 2;                // Human-readable organization name
  Region region = 3;              // Data residency region (Raft group)
  repeated NodeId members = 4;    // Nodes in the region's Raft group
  OrganizationStatus status = 5;  // Lifecycle state
  uint64 config_version = 6;      // For cache invalidation
  google.protobuf.Timestamp created_at = 7;
}

// Region leader resolution for SDK direct-connect optimization.
message ResolveRegionLeaderRequest {
  Region region = 1; // Target data residency region
}

message ResolveRegionLeaderResponse {
  string endpoint = 1;    // Full endpoint URL (e.g., "https://10.0.1.5:5000")
  uint64 raft_term = 2;   // Current Raft term (cache invalidation signal)
  uint32 ttl_seconds = 3; // Recommended cache TTL (default: 30)
}

message WatchLeaderRequest {
  Region region = 1;
}

// Server-pushed leader update. Sent once immediately on stream open (current
// state, or empty if unknown), then on each leader change.
message LeaderUpdate {
  // Full endpoint URL (e.g. "http://10.0.1.5:5000"). Empty string indicates
  // no current leader is known (election in progress).
  string endpoint = 1;
  // Raft term the leader was observed in.
  uint64 raft_term = 2;
  // Leader node ID. 0 when endpoint is empty.
  uint64 leader_node_id = 3;
}

// =============================================================================
// Raft Internal Service (inter-node communication)
// =============================================================================

// Internal Raft RPC service for consensus protocol.
// Used for inter-node communication: replication streaming, committed index queries, regional proposals.
service RaftService {
  // Query committed index for follower ReadIndex protocol.
  // Followers call this on the leader to confirm the committed index,
  // then wait locally for their applied index to catch up.
  rpc CommittedIndex(CommittedIndexRequest) returns (CommittedIndexResponse);

  // Bidirectional consensus-message transport between peers. Carries Raft
  // protocol messages (vote, append-entries, heartbeat, etc.) serialized in
  // the envelope payload. The stream is long-lived (one per peer) to amortize
  // connection setup and enable HTTP/2 flow-controlled backpressure.
  // Fire-and-forget — the server acknowledges each envelope but the client
  // discards the acks.
  rpc Replicate(stream ConsensusEnvelope) returns (stream ConsensusAck);

  // Submit a regional proposal to a region's Raft leader.
  //
  // Used exclusively by the saga orchestrator on the GLOBAL leader to commit
  // proposals across regions as part of cross-region transactions. The server
  // validates the caller is a known cluster peer (by IP — see `is_known_peer`)
  // and proposes the payload on the target region's local Raft handle,
  // returning the committed response.
  //
  // Not for client use; client writes reach their target region via
  // `NotLeader` + hint redirect, not this RPC.
  rpc RegionalProposal(RegionalProposalRequest) returns (RegionalProposalResult);
}

// Raft vote (term + node_id + committed flag).
message RaftVote {
  uint64 term = 1;
  uint64 node_id = 2;
  bool committed = 3;
}

// Raft log entry identifier.
message RaftLogId {
  uint64 term = 1;
  uint64 index = 2;
}


// Snapshot metadata.
message RaftSnapshotMeta {
  optional RaftLogId last_log_id = 1;
  RaftMembership last_membership = 2;
  string snapshot_id = 3;
}

// Raft cluster membership configuration.
message RaftMembership {
  repeated RaftMembershipConfig configs = 1;
}

// Single membership configuration (joint consensus may have multiple).
message RaftMembershipConfig {
  // Map of node_id -> address
  map<uint64, string> members = 1;
}

// ==========================================================================
// Leader Transfer
// ==========================================================================

message TransferLeadershipRequest {
  // Target node ID. If 0, the leader picks the best candidate.
  uint64 target_node_id = 1;
  // Maximum time to wait for the transfer to complete (milliseconds).
  // Default: 10000 (10 seconds). Capped at 60000 (60 seconds).
  uint32 timeout_ms = 2;
}

message TransferLeadershipResponse {
  bool success = 1;
  // Node ID that became the new leader (0 if transfer failed).
  uint64 new_leader_id = 2;
  string message = 3;
}


// CommittedIndex request: follower asks leader to confirm committed index.
message CommittedIndexRequest {
  // Region for multi-region routing (defaults to GLOBAL).
  string region = 1;
}

// CommittedIndex response: leader returns its committed index and term.
message CommittedIndexResponse {
  uint64 committed_index = 1;
  uint64 leader_term = 2;
}


// Envelope wrapping a consensus-engine message sent between peers over
// the Replicate bidirectional RPC.
message ConsensusEnvelope {
  // ConsensusState (consensus group) this message targets.
  uint64 shard_id = 1;
  // Node ID of the sender.
  uint64 from_node = 2;
  // Region the shard belongs to.
  optional Region region = 3;
  // Postcard-serialized consensus Message (the inner protocol payload).
  bytes payload = 4;
  // gRPC address of the sender (e.g. "127.0.0.1:50051").
  // Enables the receiver to auto-register a return transport channel
  // for consensus responses when the sender is not yet known.
  string from_address = 5;
  // Cluster ID for cross-cluster message rejection.
  // Receivers reject messages from different clusters.
  uint64 cluster_id = 6;
}

// Per-envelope acknowledgement. Empty; clients discard these since the
// transport is fire-and-forget — presence merely keeps HTTP/2 flow control
// flowing in both directions.
message ConsensusAck {}

// Request submitting a regional proposal to the data region leader.
message RegionalProposalRequest {
  // Target data region.
  optional Region region = 1;
  // Postcard-serialized `RaftPayload<R>` where `R` is the tier-specific
  // request type (`SystemRequest` / `RegionRequest` / `OrganizationRequest`).
  // The receiving node decodes based on the target group's tier.
  bytes request_payload = 2;
  // Caller identity (user slug or 0 for system).
  uint64 caller = 3;
  // Proposal timeout in milliseconds.
  uint32 timeout_ms = 4;
}

// Result of a submitted regional proposal.
message RegionalProposalResult {
  // Postcard-serialized LedgerResponse.
  bytes response_payload = 1;
  // gRPC status code (0 = OK).
  int32 status_code = 2;
  // Error message (empty if OK).
  string error_message = 3;
  // Last committed index on the leader after the proposal was applied.
  // The forwarding node uses this to wait for local replication before
  // returning, ensuring subsequent local reads see the written data.
  uint64 committed_index = 4;
}

// -----------------------------------------------------------------------------
// Blinding Key Rotation Messages
// -----------------------------------------------------------------------------

// Request to initiate email blinding key rotation.
// The new key version must be pre-provisioned in the external key source.
message RotateBlindingKeyRequest {
  // Version number of the new blinding key (monotonically increasing).
  uint32 new_key_version = 1;
  // Identity of the user performing this operation.
  UserSlug caller = 2;
}

// Response from initiating a blinding key rotation.
// Returns immediately — the re-hash runs asynchronously.
message RotateBlindingKeyResponse {
  // Total email hash entries to re-hash.
  uint64 total_entries = 1;
  // Entries re-hashed so far (0 on initial response).
  uint64 entries_rehashed = 2;
  // Whether the rehash is complete. Always false in the initial response;
  // poll GetBlindingKeyRehashStatus for the authoritative value.
  bool complete = 3;
}

// Request to check blinding key rehash progress.
message GetBlindingKeyRehashStatusRequest {
  // Identity of the user performing this operation.
  UserSlug caller = 1;
}

// Status of an in-flight or completed blinding key rotation.
message GetBlindingKeyRehashStatusResponse {
  // Total email hash entries to re-hash.
  uint64 total_entries = 1;
  // Entries re-hashed across all regions.
  uint64 entries_rehashed = 2;
  // Whether the rotation is fully complete.
  bool complete = 3;
  // Per-region progress: region name → entries re-hashed in that region.
  map<string, uint64> per_region_progress = 4;
  // Currently active blinding key version.
  uint32 active_key_version = 5;
}

// -----------------------------------------------------------------------------
// Region Key Rotation Messages
// -----------------------------------------------------------------------------

// Request to initiate RMK rotation for a region.
// The new key version must be pre-provisioned in the external key source.
message RotateRegionKeyRequest {
  // Region to rotate the RMK for. If empty, uses the node's primary region.
  string region = 1;
  // Target RMK version to rotate to. If 0, generates a new version.
  uint32 target_version = 2;
}

// Response from initiating an RMK rotation.
// Returns immediately — DEK re-wrapping runs asynchronously.
message RotateRegionKeyResponse {
  // New RMK version after rotation.
  uint32 new_version = 1;
  // Total pages in the sidecar that need re-wrapping.
  uint64 total_pages = 2;
  // Whether re-wrapping is already complete (true if zero pages).
  bool complete = 3;
}

// Request to check DEK re-wrapping progress.
message GetRewrapStatusRequest {
  // Region to check. If empty, uses the node's primary region.
  string region = 1;
}

// Status of an in-flight or completed DEK re-wrapping job.
message GetRewrapStatusResponse {
  // Total pages in the sidecar.
  uint64 total_pages = 1;
  // Pages processed so far.
  uint64 pages_processed = 2;
  // Pages that were actually re-wrapped (had old version).
  uint64 pages_rewrapped = 3;
  // Whether re-wrapping is fully complete.
  bool complete = 4;
  // Current target RMK version being re-wrapped to.
  uint32 target_version = 5;
  // Estimated seconds remaining (0 if complete or not started).
  uint64 estimated_remaining_secs = 6;
}

// -----------------------------------------------------------------------------
// User Erasure Messages (GDPR Article 17)
// -----------------------------------------------------------------------------

// Erase a user's PII via crypto-shredding.
// Forward-only finalization — irreversible by design.
message EraseUserRequest {
  // User slug (Snowflake ID) to erase. The server resolves this to an
  // internal user ID.
  UserSlug user = 1;
  // Identity of the user performing this operation.
  UserSlug caller = 2;
  // Region where the user's PII resides.
  Region region = 3;
}

message EraseUserResponse {
  // User slug that was erased.
  UserSlug user = 1;
}

// -----------------------------------------------------------------------------
// User Migration Messages
// -----------------------------------------------------------------------------

// Migrate existing users from flat _system store to regional directory
// structure. Explicit admin action for pre-release data migration.
message MigrateExistingUsersRequest {
  // Default region for users without an assigned region.
  Region default_region = 1;
  // Hex-encoded email blinding key for HMAC computation.
  // The key stays in the handler and never enters the Raft log.
  string email_blinding_key = 2;
}

message MigrateExistingUsersResponse {
  // User records found in the flat _system store.
  uint64 users = 1;
  // Users successfully migrated in this run.
  uint64 migrated = 2;
  // Users skipped (already have directory entries).
  uint64 skipped = 3;
  // Users that failed migration.
  uint64 errors = 4;
  // Elapsed time in seconds.
  double elapsed_secs = 5;
}

// Eagerly provision a Raft group for a region.
message ProvisionRegionRequest {
  // Region to provision.
  Region region = 1;
}

message ProvisionRegionResponse {
  // Whether the region was newly created (false if already active).
  bool created = 1;
  // Region that was provisioned.
  Region region = 2;
}

